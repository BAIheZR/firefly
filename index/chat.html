<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天功能</title>
    <link rel="stylesheet" href="../resource/font-awesome.css">
    <link rel="stylesheet" href="css/ItemAll.css">
    <link rel="stylesheet" href="css/chat.css">
</head>
<body>
    <video class="video-bg" autoplay muted loop playsinline>
        <source src="../video/chat_bg.mp4" type="video/mp4">
    </video>
    <div class="container">
        <div class="icon">
            <i class="fas fa-comments"></i>
        </div>
        <div class="content">
            <h1>聊天功能建设中...</h1>
            <p>我们正在为您开发有趣的聊天功能</p>
            
            <div class="info-box">
                <p><i class="fas fa-calendar-alt" style="color: #D2B48C; margin-right: 8px;"></i>预计上线时间</p>
                <p style="font-size: 18px; font-weight: bold; color: #333;">2026年9月前</p>
            </div>

            <button class="btn" onclick="window.location.href='inMaxNineUI.html'">
                <i class="fas fa-arrow-left"></i>返回主界面
            </button>
        </div>
    </div>
    <script>
        function applyPageBackground(pageName) {
            const pageBackgrounds = JSON.parse(localStorage.getItem('pageBackgrounds')) || {};
            if (pageBackgrounds[pageName]) {
                const video = document.querySelector('.video-bg');
                if (video) {
                    video.style.display = 'none';
                    document.body.style.background = `url(${pageBackgrounds[pageName]}) center/cover no-repeat fixed`;
                }
            }
        }
        window.addEventListener('DOMContentLoaded', function() {
            applyPageBackground('chat');
        });
    </script>
</body>
</html>
