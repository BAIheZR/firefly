<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-height, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, orientation=landscape">
    <title>流萤·共生协议 | 精准时计·进化射击</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #010101, #03050b);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', monospace;
            padding: 20px;
            overflow: hidden;
            transition: background 0.5s ease;
        }

        body.light-theme {
            background: linear-gradient(180deg, #4AB8A0 0%, #000000 100%);
        }

        body.dark-theme {
            background: radial-gradient(circle at 20% 30%, #010101, #03050b);
        }

        /* 横屏容器 */
        .landscape-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-wrapper {
            background: rgba(0, 5, 10, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 1rem;
            box-shadow: 0 30px 45px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(80, 210, 160, 0.7);
        }

        /* 移动端强制横屏 */
        @media (max-width: 768px) and (orientation: portrait) {
            body {
                width: 100vh;
                height: 100vw;
                overflow: hidden;
                padding: 0;
            }

            .landscape-container {
                width: 100vh;
                height: 100vw;
                transform: rotate(90deg);
                transform-origin: center center;
                position: fixed;
                top: 0;
                left: 0;
            }

            .game-wrapper {
                padding: 0.5rem;
                border-radius: 1.5rem;
            }
        }

        @media (max-width: 768px) and (orientation: landscape) {
            body {
                padding: 10px;
            }

            .game-wrapper {
                padding: 0.5rem;
                border-radius: 1rem;
            }
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 1.2rem;
            box-shadow: 0 0 0 2px #2c6e5a, 0 12px 28px black;
            cursor: crosshair;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 30px;
            margin-bottom: 20px;
            background: rgba(0, 15, 22, 0.9);
            backdrop-filter: blur(8px);
            padding: 16px 40px;
            border-radius: 60px;
            flex-wrap: wrap;
            border: 1px solid #3dab8a;
        }

        .stat {
            background: #021018dd;
            padding: 12px 28px;
            border-radius: 40px;
            color: #c6ffe6;
            font-weight: bold;
            text-shadow: 0 0 4px #00ffaa;
            letter-spacing: 1px;
            font-size: 1.1rem;
            white-space: nowrap;
        }

        .stat span {
            color: #ffdd77;
            font-size: 1.8rem;
            margin-left: 10px;
            text-shadow: 0 0 6px #ffaa33;
            font-weight: 800;
            font-family: monospace;
        }

        .upgrade-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(145deg, #1f4a55, #0e2e38);
            border: none;
            font-family: monospace;
            font-weight: bold;
            padding: 6px 18px;
            border-radius: 40px;
            color: #f3fffc;
            cursor: pointer;
            transition: all 0.08s linear;
            font-size: 0.8rem;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.5);
            letter-spacing: 1px;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 0 8px #6affc0;
        }

        .reset-btn {
            background: linear-gradient(145deg, #bc5a2c, #7b3218);
            box-shadow: 0 0 10px #ff7744;
        }

        .vehicle-control-btn {
            background: linear-gradient(145deg, #ff6b6b, #cc4444);
            box-shadow: 0 0 10px #ff8888;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }

        .vehicle-control-btn:hover {
            background: linear-gradient(145deg, #ff8888, #dd5555);
            box-shadow: 0 0 15px #ffaaaa;
        }

        .back-btn {
            background: linear-gradient(145deg, #4a6a7a, #2e4a5a);
            box-shadow: 0 0 8px #66aacc;
        }

        .back-btn:hover {
            box-shadow: 0 0 12px #88ccee;
        }

        .back-btn-exit {
            position: fixed;
            top: 20px;
            left: 20px;
            background: linear-gradient(145deg, #7a4a4a, #5a2e2e);
            border: none;
            font-family: monospace;
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 40px;
            color: #ffeeee;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 100, 100, 0.5);
            z-index: 1000;
        }

        .back-btn-exit:hover {
            background: linear-gradient(145deg, #8a5a5a, #6a3e3e);
            box-shadow: 0 0 20px rgba(255, 100, 100, 0.7);
            transform: translateY(-2px);
        }

        .controls-tip {
            font-size: 0.7rem;
            color: #a8e6cf;
            text-align: center;
            margin-top: 12px;
            text-shadow: 0 0 2px black;
        }

        @keyframes glowPulse {
            0% { text-shadow: 0 0 0px gold; opacity: 0.8; }
            100% { text-shadow: 0 0 8px #ffcc55; opacity: 1; }
        }
        .stat span {
            animation: glowPulse 1.5s infinite alternate;
        }

        .start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 5, 15, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            border-radius: 1.2rem;
        }

        .start-overlay.hidden {
            display: none;
        }

        .start-title {
            font-size: 2.5rem;
            color: #50d2a0;
            text-shadow: 0 0 20px #50d2a0, 0 0 40px #50d2a0;
            margin-bottom: 30px;
            letter-spacing: 4px;
        }

        .start-btn {
            padding: 18px 60px;
            font-size: 1.4rem;
            background: linear-gradient(145deg, #2a8a6a, #1a5a4a);
            border: 2px solid #50d2a0;
            border-radius: 50px;
            color: #e0fff0;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 3px;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(80, 210, 160, 0.4);
        }

        .start-btn:hover {
            background: linear-gradient(145deg, #3aaa8a, #2a7a6a);
            box-shadow: 0 0 30px rgba(80, 210, 160, 0.6);
            transform: scale(1.05);
        }

        .canvas-container {
            position: relative;
        }
        
        #minimapCanvas {
            position: fixed;
            top: 10px;
            left: calc(100% - 220px);
            border: 2px solid #50d2a0;
            border-radius: 8px;
            background: rgba(0, 10, 18, 0.8);
            box-shadow: 0 0 15px rgba(80, 210, 160, 0.3);
            z-index: 1000;
            cursor: move;
            user-select: none;
        }

        .game-status-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 10, 18, 0.85);
            backdrop-filter: blur(8px);
            padding: 10px 20px;
            border-radius: 12px;
            margin-top: 12px;
            border: 1px solid rgba(80, 210, 160, 0.4);
            font-size: 13px;
            font-family: monospace;
        }

        .status-left, .status-right {
            display: flex;
            gap: 18px;
            color: #88ccaa;
        }

        .status-left span, .status-right span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .status-center {
            color: #ffdd77;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(255, 220, 120, 0.5);
        }

        .status-center.cooldown {
            color: #8888aa;
            text-shadow: none;
        }

        .user-info-panel {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            padding: 25px 20px;
            background: rgba(0, 10, 18, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(80, 210, 160, 0.5);
            z-index: 50;
        }

        .user-avatar-container {
            position: relative;
            width: 80px;
            height: 80px;
        }

        .user-avatar-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #50d2a0;
            box-shadow: 0 0 15px rgba(80, 210, 160, 0.5);
            transition: transform 0.15s ease-out;
        }
        
        .avatar-zoom {
            position: fixed !important;
            top: 50% !important;
            left: 50% !important;
            transform: translate(-50%, -50%) scale(2.5) !important;
            z-index: 1000 !important;
            border-color: #ffcc88 !important;
            box-shadow: 0 0 40px rgba(255, 200, 100, 0.9) !important;
            transition: all 0.3s ease-out !important;
        }
        
        .skill-effect-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 0;
            height: 0;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
            pointer-events: none;
            opacity: 0;
        }
        
        .skill-effect-overlay.active {
            display: flex;
            animation: skillEffectAnim 0.3s ease-out forwards;
        }
        
        .skill-effect-overlay img {
            max-width: 50vmin;
            max-height: 50vmin;
            object-fit: contain;
        }
        
        .skill-target-img {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 500px;
            height: 500px;
            object-fit: contain;
            transition: transform 0.3s ease-out;
            z-index: 100;
            pointer-events: none;
        }
        
        .skill-target-img.active {
            display: block;
            animation: targetShake 0.15s ease-in-out infinite;
        }
        
        @keyframes targetShake {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1) rotate(0deg);
            }
            25% {
                transform: translate(-50%, -50%) scale(1) rotate(-1.5deg);
            }
            75% {
                transform: translate(-50%, -50%) scale(1) rotate(1.5deg);
            }
        }
        
        /* 移动端虚拟控制 */
        .mobile-controls {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(180deg, transparent, rgba(0,5,15,0.9));
            pointer-events: none;
            z-index: 1000;
        }

        @media (max-width: 768px) {
            .mobile-controls {
                display: block;
            }

            .controls-tip {
                display: none;
            }
        }

        /* 虚拟摇杆 */
        .joystick-container {
            position: absolute;
            left: 20px;
            bottom: 20px;
            width: 110px;
            height: 110px;
            pointer-events: auto;
        }

        .joystick-base {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(80, 210, 160, 0.3);
            border-radius: 50%;
            border: 2px solid rgba(80, 210, 160, 0.6);
        }

        .joystick-stick {
            position: absolute;
            width: 45px;
            height: 45px;
            background: rgba(80, 210, 160, 0.8);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px rgba(80, 210, 160, 0.5);
            transition: background 0.2s;
        }

        .joystick-stick.active {
            background: rgba(80, 210, 160, 1);
        }

        /* 移动端按钮 */
        .mobile-buttons {
            position: absolute;
            right: 20px;
            bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: auto;
        }

        .mobile-btn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            color: white;
            border: none;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            -webkit-tap-highlight-color: transparent;
        }

        .mobile-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        .btn-shoot {
            background: linear-gradient(145deg, #50d2a0, #2a9a7a);
            width: 80px;
            height: 80px;
            font-size: 20px;
        }

        .btn-vehicle1 {
            background: linear-gradient(145deg, #ff6b6b, #cc4444);
        }

        .btn-vehicle2 {
            background: linear-gradient(145deg, #ffa502, #cc8400);
        }

        .btn-ammo {
            background: linear-gradient(145deg, #a55eea, #8854d0);
        }

        .mobile-btn span {
            font-size: 9px;
            margin-top: 2px;
        }

        /* 移动端载具选择面板 */
        .mobile-vehicle-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 10, 18, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            border: 2px solid #50d2a0;
            padding: 20px;
            z-index: 2000;
            display: none;
        }

        .mobile-vehicle-panel.visible {
            display: block;
        }

        .mobile-vehicle-title {
            color: #50d2a0;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
        }

        .mobile-vehicle-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .mobile-vehicle-item {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            background: rgba(80, 210, 160, 0.2);
            border: 1px solid rgba(80, 210, 160, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mobile-vehicle-item:hover,
        .mobile-vehicle-item:active {
            background: rgba(80, 210, 160, 0.4);
            border-color: #50d2a0;
        }

        .mobile-vehicle-item.empty {
            opacity: 0.4;
        }

        .mobile-vehicle-item.selected {
            border-color: #ffdd77;
            background: rgba(255, 220, 120, 0.2);
        }

        /* 屏幕触摸射击区域 */
        .touch-shoot-area {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 900;
        }

        .touch-shoot-area.active {
            pointer-events: auto;
        }

        @keyframes skillEffectAnim {
            0% {
                width: 0;
                height: 0;
                opacity: 0;
            }
            30% {
                width: 100vmin;
                height: 100vmin;
                opacity: 0.9;
            }
            100% {
                width: 0;
                height: 0;
                opacity: 0;
            }
        }

        .avatar-name {
            color: #e0fff0;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 6px rgba(80, 210, 160, 0.5);
            margin-top: 5px;
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #gameUserName {
            font-size: 14px;
            max-width: 80px;
        }

        .user-info-panel.disabled .stat-value {
            opacity: 0.4;
        }

        .vehicle-panel {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 20px 15px;
            background: rgba(0, 10, 18, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(80, 210, 160, 0.5);
            z-index: 50;
            min-width: 100px;
        }

        .vehicle-panel-title {
            color: #50d2a0;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 8px rgba(80, 210, 160, 0.5);
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .vehicle-slot {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 10px 8px;
            border-radius: 12px;
            background: rgba(0, 20, 30, 0.6);
            border: 1px solid rgba(80, 210, 160, 0.25);
            transition: all 0.3s ease;
            min-width: 80px;
        }

        .vehicle-slot.filled {
            border-color: rgba(80, 210, 160, 0.5);
            background: rgba(80, 210, 160, 0.08);
        }

        .vehicle-slot.filled:hover {
            border-color: #50d2a0;
            box-shadow: 0 0 12px rgba(80, 210, 160, 0.3);
        }

        .vehicle-slot-img {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            object-fit: contain;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        
        .vehicle-cooldown-canvas {
            position: absolute;
            width: 48px;
            height: 48px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
        }

        .vehicle-slot-name {
            color: #c6ffe6;
            font-size: 10px;
            text-align: center;
            max-width: 90px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            text-shadow: 0 0 4px rgba(80, 210, 160, 0.3);
        }

        .vehicle-slot.empty .vehicle-slot-name {
            color: #3a5a4a;
        }

        .ammo-dialog {
            position: fixed;
            right: -400px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 20px 15px;
            background: rgba(0, 10, 18, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            border: 2px solid rgba(80, 210, 160, 0.6);
            box-shadow: 0 0 30px rgba(80, 210, 160, 0.3);
            z-index: 100;
            min-width: 280px;
            transition: right 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .ammo-dialog.visible {
            right: 130px;
        }

        .ammo-dialog-title {
            color: #50d2a0;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 8px rgba(80, 210, 160, 0.5);
            letter-spacing: 2px;
            margin-bottom: 8px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(80, 210, 160, 0.3);
        }

        .ammo-slot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-radius: 10px;
            background: rgba(0, 20, 30, 0.6);
            border: 1px solid rgba(80, 210, 160, 0.25);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .ammo-slot:hover {
            border-color: #50d2a0;
            background: rgba(80, 210, 160, 0.1);
            box-shadow: 0 0 12px rgba(80, 210, 160, 0.2);
        }

        .ammo-slot.selected {
            border-color: #ffdd77;
            background: rgba(255, 220, 120, 0.15);
            box-shadow: 0 0 15px rgba(255, 220, 120, 0.3);
        }

        .ammo-slot.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .ammo-name {
            color: #c6ffe6;
            font-size: 13px;
            font-weight: bold;
            text-shadow: 0 0 4px rgba(80, 210, 160, 0.3);
        }

        .ammo-count {
            color: #ffdd77;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 0 0 6px rgba(255, 220, 120, 0.5);
        }

        .reload-bar-container {
            margin-top: 8px;
            padding: 10px;
            background: rgba(0, 10, 18, 0.8);
            border-radius: 8px;
            border: 1px solid rgba(80, 210, 160, 0.2);
        }

        .reload-bar-label {
            color: #88ccaa;
            font-size: 11px;
            margin-bottom: 5px;
            text-align: center;
        }

        .reload-bar {
            height: 8px;
            background: rgba(80, 210, 160, 0.2);
            border-radius: 4px;
            overflow: hidden;
        }

        .reload-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #50d2a0, #88ffcc);
            border-radius: 4px;
            transition: width 0.1s linear;
            box-shadow: 0 0 8px rgba(80, 210, 160, 0.5);
        }

        .plane-cooldown-display {
            margin-top: 8px;
            padding: 10px;
            background: rgba(0, 10, 18, 0.8);
            border-radius: 8px;
            border: 1px solid rgba(255, 136, 102, 0.3);
        }

        .cooldown-bar-label {
            color: #ff8866;
            font-size: 11px;
            margin-bottom: 5px;
            text-align: center;
        }

        .cooldown-bar {
            height: 8px;
            background: rgba(255, 136, 102, 0.2);
            border-radius: 4px;
            overflow: hidden;
        }

        .cooldown-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff8866, #ffaa88);
            border-radius: 4px;
            transition: width 0.1s linear;
            box-shadow: 0 0 8px rgba(255, 136, 102, 0.5);
        }

        .cooldown-remaining {
            color: #ffaa88;
            font-size: 12px;
            text-align: center;
            margin-top: 5px;
            text-shadow: 0 0 6px rgba(255, 136, 102, 0.5);
        }

        .close-ammo-dialog {
            position: absolute;
            top: 8px;
            right: 12px;
            background: none;
            border: none;

<script>
    (function(){
        // 应用主题设置
        const savedTheme = localStorage.getItem('currentTheme') || 'light';
        document.body.classList.add(savedTheme + '-theme');
        
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // ---------- 读取同协快捷键设置 ----------
        function loadCoopKeySettings() {
            const settings = JSON.parse(localStorage.getItem('userSettings')) || {};
            return {
                vehicleKey1: (settings.vehicleKey1 || '1').toUpperCase(),
                vehicleKey2: (settings.vehicleKey2 || '2').toUpperCase(),
                vehicleKey3: (settings.vehicleKey3 || '3').toUpperCase(),
                vehicleKey4: (settings.vehicleKey4 || '4').toUpperCase(),
                vehicleKey5: (settings.vehicleKey5 || '5').toUpperCase(),
                ammoKey1: (settings.ammoKey1 || 'F1').toUpperCase(),
                ammoKey2: (settings.ammoKey2 || 'F2').toUpperCase(),
                ammoKey3: (settings.ammoKey3 || 'F3').toUpperCase(),
                attackKey: settings.coopAttackKey || 'Mouse1',
                fireRateKey: (settings.coopFireRateKey || 'Z').toUpperCase(),
                damageKey: (settings.coopDamageKey || 'C').toUpperCase(),
                fireKey: (settings.coopFireKey || ' ').toUpperCase(),
                stopAttackKey: (settings.coopStopAttackKey || 'X').toUpperCase()
            };
        }
        
        let coopKeys = loadCoopKeySettings();
        
        // ---------- 大地图系统 ----------
        const MAP_SCALE = 10; // 10px = 1米
        const MAP_WIDTH = 2000 * MAP_SCALE; // 2km = 2000m
        const MAP_HEIGHT = 2500 * MAP_SCALE; // 2.5km = 2500m
        
        // 缩放系统
        // 视口跟随
        let viewport = { x: 0, y: 0 };
        
        function updateViewport() {
            // 视口中心跟随玩家，保持在地图边界内
            const effectiveWidth = canvas.width;
            const effectiveHeight = canvas.height;
            viewport.x = player.x - effectiveWidth / 2;
            viewport.y = player.y - effectiveHeight / 2;
            
            // 边界限制
            viewport.x = Math.max(0, Math.min(viewport.x, MAP_WIDTH - effectiveWidth));
            viewport.y = Math.max(0, Math.min(viewport.y, MAP_HEIGHT - effectiveHeight));
        }
        
        function drawMap() {
            // 绘制地图背景
            const bgGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            bgGradient.addColorStop(0, '#0a1628');
            bgGradient.addColorStop(0.5, '#0d1f35');
            bgGradient.addColorStop(1, '#061018');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制网格线 (每10米一条线)
            ctx.strokeStyle = 'rgba(80, 210, 160, 0.15)';
            ctx.lineWidth = 1;
            
            // 计算起始网格坐标（考虑缩放后的有效视口）
            const gridInterval = 10 * MAP_SCALE; // 10米 = 100px
            const effectiveWidth = canvas.width;
            const effectiveHeight = canvas.height;
            const startGridX = Math.floor(viewport.x / gridInterval) * gridInterval;
            const startGridY = Math.floor(viewport.y / gridInterval) * gridInterval;
            
            // 绘制垂直线
            for (let x = startGridX; x < viewport.x + effectiveWidth + gridInterval; x += gridInterval) {
                ctx.beginPath();
                ctx.moveTo(x - viewport.x, 0);
                ctx.lineTo(x - viewport.x, canvas.height);
                ctx.stroke();
            }
            
            // 绘制水平线
            for (let y = startGridY; y < viewport.y + effectiveHeight + gridInterval; y += gridInterval) {
                ctx.beginPath();
                ctx.moveTo(0, y - viewport.y);
                ctx.lineTo(canvas.width, y - viewport.y);
                ctx.stroke();
            }
        }
        
        // ---------- 游戏核心 ----------
        let gameStarted = false;
        let gamePaused = false;
        let gameActive = true;
        let liuyingClearing = false;
        let liuyingUltimate1Active = false;
        let liuyingUltimate1Timer = 0;
        let liuyingUltimate2Active = false;
        let liuyingUltimate2Timer = 0;
        let survivalSeconds = 0;
        let entropyLevel = 0;
        let currency = 0;
        let killCount = 0;
        let gameExp = 0;
        let vehicleKillCount = 0;
        let nuclearLaunched = false; // 是否已触发核弹
        
        // 小地图
        const minimapCanvas = document.getElementById('minimapCanvas');
        const minimapCtx = minimapCanvas.getContext('2d');
        const MINIMAP_SCALE_X = minimapCanvas.width / MAP_WIDTH;
        const MINIMAP_SCALE_Y = minimapCanvas.height / MAP_HEIGHT;
        
        function drawMinimap() {
            const mctx = minimapCtx;
            
            // 清空画布
            mctx.fillStyle = '#0a1628';
            mctx.fillRect(0, 0, minimapCanvas.width, minimapCanvas.height);
            
            // 绘制网格线
            mctx.strokeStyle = 'rgba(80, 210, 160, 0.2)';
            mctx.lineWidth = 0.5;
            
            const gridIntervalX = 100 * MINIMAP_SCALE_X;
            const gridIntervalY = 100 * MINIMAP_SCALE_Y;
            
            for (let x = 0; x < minimapCanvas.width; x += gridIntervalX) {
                mctx.beginPath();
                mctx.moveTo(x, 0);
                mctx.lineTo(x, minimapCanvas.height);
                mctx.stroke();
            }
            
            for (let y = 0; y < minimapCanvas.height; y += gridIntervalY) {
                mctx.beginPath();
                mctx.moveTo(0, y);
                mctx.lineTo(minimapCanvas.width, y);
                mctx.stroke();
            }
            
            // 绘制视口范围
            const viewX = viewport.x * MINIMAP_SCALE_X;
            const viewY = viewport.y * MINIMAP_SCALE_Y;
            const viewW = canvas.width * MINIMAP_SCALE_X;
            const viewH = canvas.height * MINIMAP_SCALE_Y;
            
            mctx.strokeStyle = 'rgba(80, 210, 160, 0.6)';
            mctx.lineWidth = 1;
            mctx.strokeRect(viewX, viewY, viewW, viewH);
            
            // 绘制流萤位置（紫色点）
            const liuyingX = liuying.x * MINIMAP_SCALE_X;
            const liuyingY = liuying.y * MINIMAP_SCALE_Y;
            mctx.fillStyle = '#ffb7c5';
            mctx.beginPath();
            mctx.arc(liuyingX, liuyingY, 4, 0, Math.PI * 2);
            mctx.fill();
            
            // 绘制怪物位置（根据类型显示不同颜色）
            for (let m of monsters) {
                const monsterX = m.x * MINIMAP_SCALE_X;
                const monsterY = m.y * MINIMAP_SCALE_Y;
                mctx.fillStyle = m.minimapColor || '#ff8c00';
                mctx.beginPath();
                mctx.arc(monsterX, monsterY, 3, 0, Math.PI * 2);
                mctx.fill();
                
                // 检查这个怪物是否被载具瞄准
                const isTargeted = Object.values(vehicleTargets).includes(m);
                if (isTargeted) {
                    // 绘制瞄准框（金色光环）
                    mctx.strokeStyle = '#ffd700';
                    mctx.lineWidth = 2;
                    mctx.beginPath();
                    mctx.arc(monsterX, monsterY, 6, 0, Math.PI * 2);
                    mctx.stroke();
                    // 绘制十字准星
                    mctx.strokeStyle = '#ffd700';
                    mctx.lineWidth = 1;
                    mctx.beginPath();
                    mctx.moveTo(monsterX - 5, monsterY);
                    mctx.lineTo(monsterX + 5, monsterY);
                    mctx.moveTo(monsterX, monsterY - 5);
                    mctx.lineTo(monsterX, monsterY + 5);
                    mctx.stroke();
                    
                    // 绘制范围圈（如果有范围伤害弹药）
                    for (const [vehicleId, target] of Object.entries(vehicleTargets)) {
                        if (target === m) {
                            const vehicle = vehicleData.find(v => v.id === vehicleId);
                            if (vehicle && vehicle.ammo) {
                                const state = vehicleAmmoState[vehicleId];
                                const ammoIdx = state ? state.selectedAmmoIndex : 0;
                                const ammoConfig = vehicle.ammo[ammoIdx];
                                if (ammoConfig && ammoConfig.splashRadius) {
                                    const splashRadiusX = ammoConfig.splashRadius * MINIMAP_SCALE_X;
                                    const splashRadiusY = ammoConfig.splashRadius * MINIMAP_SCALE_Y;
                                    // 绘制椭圆范围圈
                                    mctx.strokeStyle = 'rgba(255, 100, 0, 0.6)';
                                    mctx.lineWidth = 1;
                                    mctx.setLineDash([3, 3]);
                                    mctx.beginPath();
                                    mctx.ellipse(monsterX, monsterY, splashRadiusX, splashRadiusY, 0, 0, Math.PI * 2);
                                    mctx.stroke();
                                    mctx.setLineDash([]);
                                }
                            }
                            break;
                        }
                    }
                }
            }
            
            // 绘制远程怪物子弹（黄色射线）
            for (let p of projectiles) {
                const projX = p.x * MINIMAP_SCALE_X;
                const projY = p.y * MINIMAP_SCALE_Y;

            if (monsters.length >= MAX_MONSTER_COUNT) return;
            // 远程怪物数量已达上限则不再生成远程
            let forceMelee = (currentRangedMonsterCount >= MAX_RANGED_MONSTERS);
            let availableTypes = [];
            let unlockedCount = getUnlockedTypesCount();
            for (let i=0; i<unlockedCount; i++) {
                let t = monsterTypes[i];
                if (t.isBoss) continue; // 排除boss，boss由专门逻辑生成
                if (forceMelee && t.isRanged) continue;
                // 远程怪物只有在侵蚀等级 >= 1 时才能生成 (unlockLevel >=1)
                if (t.isRanged && entropyLevel < 1) continue;
                availableTypes.push(i);
            }
            if (availableTypes.length === 0) availableTypes = [0];
            let typeIdx = availableTypes[Math.floor(Math.random() * availableTypes.length)];
            let template = monsterTypes[typeIdx];
            let isRanged = template.isRanged || false;
            
            // 在玩家周围100-500米范围内生成怪物

            let monster = {

                hp: baseHp,
                maxHp: baseHp,
                radius: size,
                speed: Math.min(5.8, baseSpeed),
                isRanged: isRanged,
                rangedCooldown: isRanged ? (Math.random() * 1.5) : 0,
                type: template.name,

                color1: template.color1,

                rangedCdBase: template.rangedBaseCd || 2.5,
                hasShield: template.hasShield || false,

            if (entropyLevel >= MAX_ENTROPY_LEVEL && bossSpawnedAtMaxLevel) {
                if (survivalSeconds >= nextBossSpawnTime) {
                    // Boss前5秒空闲期
                    if (bossIdleTime <= 0) {
                        bossIdleTime = 5; // 设置5秒空闲期
                        createFloatingText(`⚠️ Boss即将出现！`, canvas.width/2, 140, "#ff8800", 24);
                    } else if (monsters.length === 0) {
                        // 空闲期结束且没有其他怪物时生成Boss
                        spawnBoss();
                        nextBossSpawnTime = survivalSeconds + 120;
                        bossIdleTime = 0;
                    }
                    return;
                }
            }
            
            // 如果当前有波次进行中，不生成新波次
            if (waveInProgress) {
                // 检查波次是否完成
                if (monsters.length === 0) {
                    waveInProgress = false;
                    waveCooldown = 0.5; // 波次间隔0.5秒
                }
                return;
            }
            
            // 如果在波次间隔冷却中
            if (waveCooldown > 0) {
                return;
            }
            
            // 生成新波次
            if (monsters.length === 0) {
                let maxCount = Math.min(15 + entropyLevel * 5, MAX_MONSTER_COUNT);
                let minCount = Math.min(10, maxCount);
                let waveCount = Math.floor(Math.random() * (maxCount - minCount + 1)) + minCount;
                
                for (let i = 0; i < waveCount && monsters.length < MAX_MONSTER_COUNT; i++) {
                    spawnMonster();
                }
                waveInProgress = true;
            }
        }

        // 更新远程怪物射击 (侵蚀等级>=1才会射击)
        function updateRangedMonsters(nowSec) {
            if (entropyLevel < 1) return; // 侵蚀等级1以下远程怪物不会射击
            for (let m of monsters) {
                if (!m.isRanged) continue;
                if (m.rangedCooldown > 0) {
                    m.rangedCooldown -= 0.05;
                    continue;
                }
                let distToPlayer = Math.hypot(player.x - m.x, player.y - m.y);
                if (distToPlayer < 400 && distToPlayer > 60) {
                    let bulletCount = 1 + Math.min(MAX_PROJECTILES_PER_VOLLEY - 1, Math.floor(entropyLevel / 5));
                    let baseSpeed = 3.2;
                    let extraSpeed = Math.min(4.0, entropyLevel * 0.25);
                    let projSpeed = Math.min(7.2, baseSpeed + extraSpeed);
                    
                    for (let b=0; b<bulletCount; b++) {
                        let spread = (b - (bulletCount-1)/2) * 0.12;
                        let dx = player.x - m.x;
                        let dy = player.y - m.y;
                        let len = Math.hypot(dx, dy);
                        if (len < 0.01) continue;
                        let dirX = dx / len;
                        let dirY = dy / len;
                        let angle = Math.atan2(dirY, dirX) + spread;
                        let finalVx = Math.cos(angle) * projSpeed;
                        let finalVy = Math.sin(angle) * projSpeed;
                        projectiles.push({
                            x: m.x, y: m.y, vx: finalVx, vy: finalVy, radius: 7,
                            damage: 22 + entropyLevel * 2.2,
                            life: 5.0
                        });
                    }
                    let cdReduction = Math.min(0.8, entropyLevel * 0.03);
                    m.rangedCooldown = Math.max(1.2, m.rangedCdBase - cdReduction);
                }
            }
        }
        
        function updateProjectiles() {
            for (let i=0; i<projectiles.length; i++) {
                let p = projectiles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life = (p.life || 5) - 0.05;
                if (p.x<-100 || p.x>MAP_WIDTH+100 || p.y<-100 || p.y>MAP_HEIGHT+100 || p.life <= 0) {
                    projectiles.splice(i,1);
                    i--;
                    continue;
                }
                let distToPlayer = Math.hypot(player.x - p.x, player.y - p.y);
                if (distToPlayer < player.radius + p.radius) {
                    gameActive = false;
                    liuyingClearing = true;
                    clearAllMonstersByLiuying();
                    projectiles.splice(i,1);
                    return;
                }
            }
        }
        
        // 流萤 AI
        function updateLiuying(nowSec) {
            if (!gameActive || liuyingClearing) return;
            liuying.trailPos.unshift({x: liuying.x, y: liuying.y, life: 0.25});
            if (liuying.trailPos.length > 6) liuying.trailPos.pop();
            for (let t of liuying.trailPos) t.life -= 0.025;
            liuying.trailPos = liuying.trailPos.filter(t => t.life > 0);
            liuying.wingAngle = Math.sin(nowSec * 9) * 0.4;
            liuying.glowIntensity = 0.7 + Math.sin(nowSec * 7) * 0.25;
            
            // 流萤跟随范围限制在屏幕内（玩家周围）
            const liuyingRange = 150;
            
            // 检查屏幕内是否有怪物
            let bestTarget = null;
            let bestPriority = -Infinity;
            let hasMonsterOnScreen = false;
            
            for (let m of monsters) {
                // 检查怪物是否在屏幕内
                if (m.x >= viewport.x && m.x <= viewport.x + canvas.width &&
                    m.y >= viewport.y && m.y <= viewport.y + canvas.height) {
                    hasMonsterOnScreen = true;
                    let distToPlayer = Math.hypot(m.x - player.x, m.y - player.y);
                    let priority = 1000 / (distToPlayer + 15);
                    if (m.isRanged) priority *= 1.3;
                    if (priority > bestPriority) {
                        bestPriority = priority;
                        bestTarget = m;
                    }
                }
            }
            
            let desireX = liuying.x, desireY = liuying.y;
            
            if (hasMonsterOnScreen && bestTarget) {
                // 屏幕内有怪物，追击最近的怪物
                let dx = bestTarget.x - liuying.x;
                let dy = bestTarget.y - liuying.y;
                let len = Math.hypot(dx, dy);
                if (len > 0.01) {
                    let move = Math.min(liuying.speed * 1.5, len);
                    desireX = liuying.x + (dx / len) * move;
                    desireY = liuying.y + (dy / len) * move;
                }
            } else {
                // 屏幕内没有怪物，直接跟随在玩家身旁
                let dx = player.x - liuying.x;
                let dy = player.y - liuying.y;
                let distToPlayer = Math.hypot(dx, dy);
                
                // 保持在玩家身旁50-80像素的位置
                const followDist = 60;
                if (distToPlayer > followDist + 10) {
                    desireX = liuying.x + (dx / distToPlayer) * (distToPlayer - followDist) * 0.2;
                    desireY = liuying.y + (dy / distToPlayer) * (distToPlayer - followDist) * 0.2;
                } else if (distToPlayer < followDist - 10) {
                    desireX = liuying.x - (dx / distToPlayer) * (followDist - distToPlayer) * 0.2;
                    desireY = liuying.y - (dy / distToPlayer) * (followDist - distToPlayer) * 0.2;
                } else {
                    // 距离合适，保持不动或轻微跟随玩家移动
                    desireX = liuying.x + dx * 0.05;
                    desireY = liuying.y + dy * 0.05;
                }
            }
            
            // 限制在屏幕范围内
            const screenMinX = viewport.x + 25;
            const screenMaxX = viewport.x + canvas.width - 25;
            const screenMinY = viewport.y + 25;
            const screenMaxY = viewport.y + canvas.height - 25;
            
            desireX = Math.min(Math.max(desireX, screenMinX), screenMaxX);
            desireY = Math.min(Math.max(desireY, screenMinY), screenMaxY);
            let lerp = 0.38;
            liuying.x = liuying.x + (desireX - liuying.x) * lerp;
            liuying.y = liuying.y + (desireY - liuying.y) * lerp;
            liuying.x = Math.min(Math.max(liuying.x, screenMinX), screenMaxX);
            liuying.y = Math.min(Math.max(liuying.y, screenMinY), screenMaxY);
            
            if (nowSec - liuying.lastAttackTime >= 1/liuying.attackRate && bestTarget) {
                liuying.lastAttackTime = nowSec;
                let hitCount = 0;
                let extraAttackCount = 0;
                for (let i=0; i<monsters.length; i++) {
                    let m = monsters[i];
                    let distToM = Math.hypot(liuying.x - m.x, liuying.y - m.y);
                    if (distToM < MELEE_RADIUS) {
                        let dmgMulti = 1.0 + (1 - Math.min(1, distToM / MELEE_RADIUS)) * 1.5;
                        let baseDamage = BASE_MELEE_DAMAGE + liuyingDamageBonus;
                        let dmg = Math.floor((baseDamage + entropyLevel * 1.5) * dmgMulti);
                        if (m.hasShield && m.shieldHp > 0) {
                            m.shieldHp -= dmg;
                            createFloatingText(`🛡️${Math.floor(m.shieldHp)}`, m.x, m.y-20, "#88ddff", 14);
                            if (m.shieldHp <= 0) {
                                m.hasShield = false;
                                m.shieldHp = 0;
                                createFloatingText("🛡️护盾破碎", m.x, m.y-20, "#88ddff", 16);
                                hitCount--;
                                extraAttackCount++;
                            }
                        } else {
                            m.hp -= dmg;
                            if (m.hp <= 0) { killMonster(i, true); i--; }
                        }
                        hitCount++;
                        if (m.hasShield) extraAttackCount++;
                    }
                }
                if (hitCount > 0) {
                    liuying.attackTimer = 0.4;
                    screenShakeEffect(3, 0.1);
                    let attackText = `🌊 共振斩 · ${hitCount}`;
                    if (extraAttackCount > 0) attackText += ` (+${extraAttackCount}破盾)`;
                    createFloatingText(attackText, liuying.x, liuying.y-28, "#ffbb88", 20);
                    for (let i=0;i<22;i++) {
                        let ang = Math.random() * Math.PI * 2;
                        let rad = MELEE_RADIUS * 0.7;
                        let px = liuying.x + Math.cos(ang) * rad;
                        let py = liuying.y + Math.sin(ang) * rad;
                        addParticle(px, py, (Math.random()-0.5)*2.2, (Math.random()-0.5)*2.2, 0.4, "#ffaa77", 4, true);
                    }
                }
            }
            
            for (let i=0; i<monsters.length; i++) {
                let m = monsters[i];
                if (Math.hypot(liuying.x - m.x, liuying.y - m.y) < liuying.radius + m.radius) {
                    let blastDmg = 55 + entropyLevel * 2.2;
                    for (let j=0; j<monsters.length; j++) {
                        let m2 = monsters[j];
                        if (Math.hypot(liuying.x - m2.x, liuying.y - m2.y) < 100) {
                            m2.hp -= blastDmg;
                            if (m2.hp <= 0) { killMonster(j, true); j--; }
                        }
                    }
                    liuying.attackTimer = 0.5;
                    screenShakeEffect(6, 0.15);
                    createFloatingText("⚡ 脉冲过载", liuying.x, liuying.y-22, "#ffffff", 22);
                    for (let s=0;s<30;s++) {
                        let ang = Math.random() * Math.PI*2;
                        let rad = 50;
                        let px = liuying.x + Math.cos(ang)*rad;
                        let py = liuying.y + Math.sin(ang)*rad;
                        addParticle(px, py, (Math.random()-0.5)*3, (Math.random()-0.5)*3, 0.5, "#aaffff", 5, true);
                    }
                    break;
                }
            }
            if (liuying.attackTimer > 0) liuying.attackTimer -= 0.05;
        }

            gameActive = false;
            for (let i=0; i<monsters.length; i++) monsters[i].hp = 0;

        // 大招1：范围终焉（30秒冷却，触发条件：怪物在玩家100m内）

        // 大招2：精准打击（5分钟后首次触发，之后60秒冷却）

        function handlePlayerCollision() {
            for (let i=0; i<monsters.length; i++) {
                let m = monsters[i];
                if (Math.hypot(player.x - m.x, player.y - m.y) < player.radius + m.radius) {
                    gameActive = false;
                    liuyingClearing = true;
                    clearAllMonstersByLiuying();
                    return true;
                }
            }
            return false;
        }
        
        // 玩家移动射击
        const keys = { w:false,s:false,a:false,d:false };
        function handlePlayerMove() {
            if (!gameActive || liuyingClearing) return;
            let dx=0,dy=0;
            if(keys.w) dy-=1; if(keys.s) dy+=1; if(keys.a) dx-=1; if(keys.d) dx+=1;
            if(dx!==0 || dy!==0) { let len=Math.hypot(dx,dy); dx/=len; dy/=len; }
            let newX = player.x + dx*player.speed;
            let newY = player.y + dy*player.speed;
            // 限制玩家在地图范围内移动
            player.x = Math.min(Math.max(newX, player.radius+5), MAP_WIDTH - player.radius-5);
            player.y = Math.min(Math.max(newY, player.radius+5), MAP_HEIGHT - player.radius-5);
            // 更新视口
            updateViewport();
        }
        
        function shootAuto(nowSec) {
            if (!gameActive || liuyingClearing) return;
            if (!mouseDown || monsters.length===0) return;
            if (nowSec - lastShootTime < 1/fireRate) return;
            lastShootTime = nowSec;
            
            let target = null;
            // 玩家使用自己独立的瞄准系统，与载具自动攻击互不干扰
            target = getPlayerTarget();
            
            // 如果玩家没有目标，选择最近的敌人（玩家自己的逻辑）
            if (!target) {
                let closest=null, minD=Infinity;
                // 优先瞄准屏幕内的怪物
                for(let m of monsters){
                    if(m.x < viewport.x || m.x > viewport.x + canvas.width ||
                       m.y < viewport.y || m.y > viewport.y + canvas.height) continue;
                    let d=Math.hypot(m.x-player.x, m.y-player.y);
                    if(d<minD){ minD=d; closest=m; }
                }
                // 如果屏幕内没有怪物，选择最近的怪物
                if(!closest){
                    for(let m of monsters){
                        let d=Math.hypot(m.x-player.x, m.y-player.y);
                        if(d<minD){ minD=d; closest=m; }
                    }
                }
                target = closest;
                // 设置玩家目标以便下次攻击继续锁定
                setPlayerTarget(target);
            }
            
            if(!target) return;
            let dx=target.x-player.x, dy=target.y-player.y;
            let len=Math.hypot(dx, dy);
            dx/=len; dy/=len;

            // 获取当前选中的弹药效果
            let bulletEffect = null;
            if (currentSelectedVehicle && vehicleAmmoState[currentSelectedVehicle.id]) {
                const state = vehicleAmmoState[currentSelectedVehicle.id];
                const ammoIndex = state.selectedAmmoIndex;
                if (currentSelectedVehicle.ammo[ammoIndex] && currentSelectedVehicle.ammo[ammoIndex].effect) {
                    bulletEffect = currentSelectedVehicle.ammo[ammoIndex].effect;
                }
            }

            bullets.push({
                x:player.x, y:player.y, vx:dx*bulletSpeed, vy:dy*bulletSpeed,
                radius:5.5, damage:bulletDamage, hitList:[], effect: bulletEffect, target: target
            });
        }
        
        function updateBullets() {
            for(let i=0;i<bullets.length;i++){
                let b=bullets[i];
                b.x+=b.vx; b.y+=b.vy;
                if(b.x+b.radius<0 || b.x-b.radius>MAP_WIDTH || b.y+b.radius<0 || b.y-b.radius>MAP_HEIGHT){
                    bullets.splice(i,1); i--; continue;
                }
                let hit=false;
                let hitCount = 0;
                const maxHits = b.penetration > 0 ? b.penetration : 1;
                
                for(let j=0;j<monsters.length;j++){
                    if (hitCount >= maxHits) break;
                    
                    let m=monsters[j];
                    // 载具子弹可以打击全地图范围的怪物
                    // 注意：这里移除了屏幕内限制，允许载具攻击地图上任何位置的敌人
                    if(Math.hypot(b.x-m.x, b.y-m.y) < b.radius+m.radius){
                        if(b.hitList.includes(m)) continue;
                        
                        // 计算伤害
                        let damage = b.damage;
                        
                        // 破甲弹对重甲目标造成额外伤害
                        if (b.effect === 'armorPenetration' && m.isHeavyArmor) {
                            damage = 175; // 对重甲目标175血
                        }
                        
                        // 秒杀逻辑：检查是否是秒杀弹药且不是boss
                        if (b.isInstantKill && !m.isBoss) {
                            m.hp = 0; // 直接秒杀
                            createFloatingText('💥秒杀!', m.x, m.y - 20, '#ff4444', 16);
                            // 秒杀时记录目标最大血量作为伤害
                            trackDamage(m.maxHp || damage);
                        } else {
                            m.hp -= damage;
                            trackDamage(damage);
                        }
                        
                        // 应用眩晕效果
                        if (b.effect === 'stun' && !m.isBoss) {
                            m.stunnedUntil = performance.now() / 1000 + 5; // 眩晕5秒
                        }
                        b.hitList.push(m);
                        if(m.hp<=0){ 
                            // 如果是载具击杀，显示特殊提示
                            if (b.isVehicleKill) {
                                vehicleKillCount = (vehicleKillCount || 0) + 1;
                                createFloatingText('🎯' + (b.vehicleName || '载具') + '击杀!', m.x, m.y - 25, '#50d2a0', 14);
                                createFloatingText('+'+ Math.floor(10 + entropyLevel * 1.5) + ' 积分', m.x, m.y - 10, '#ffee88', 12);
                            }
                            killMonster(j,false); 
                            j--; 
                        }
                        hit=true;
                        hitCount++;
                    }
                }
                if(hit){ bullets.splice(i,1); i--; createExplosion(b.x, b.y, "#ffaa55", 5, 1.5); }
            }
        }
        
        function updateMonsters() {
            if (!gameActive || liuyingClearing) return;
            var nowSec = performance.now() / 1000;
            for(let m of monsters){
                // 检查是否被眩晕
                if (m.stunnedUntil && nowSec < m.stunnedUntil) {
                    continue; // 眩晕中，不移动
                }
                let dx=player.x-m.x, dy=player.y-m.y;
                let len=Math.hypot(dx,dy);
                if(len>0.01){
                    let move = Math.min(m.speed, len - (player.radius+m.radius));
                    if(move>0){ m.x += (dx/len)*move; m.y += (dy/len)*move; }
                }
            }
            handlePlayerCollision();
        }
        
        // 侵蚀等级: 每60秒提升一级 (精确计时)
        function updateEntropy(nowSec) {
            if(!gameActive || liuyingClearing) return;
            
            // 检查是否有难度保持卡生效
            if (isDifficultyKept()) {
                return; // 如果有难度保持卡生效，不提升难度
            }
            
            // 每分钟整点提升等级 (基于存活秒数)
            let currentMinute = Math.floor(survivalSeconds / 60);
            if (currentMinute > entropyLevel) {
                entropyLevel = Math.min(currentMinute, MAX_ENTROPY_LEVEL);
                updateUI();
                createFloatingText(`🌀 侵蚀等级 ${entropyLevel}`, canvas.width/2, 120, "#ff8866", 26);
                screenShakeEffect(5, 0.2);
                if (entropyLevel === 1) {
                    createFloatingText(`⚠️ 远程畸变体出现！`, canvas.width/2, 160, "#ffaa66", 22);
                }
                if (entropyLevel === 2) {
                    createFloatingText(`⚠️ 共生协议超载：清屏冷却延长至10秒`, canvas.width/2, 160, "#ffaa66", 22);
                }
                // 达到最高等级时生成第一次boss
                if (entropyLevel >= MAX_ENTROPY_LEVEL && !bossSpawnedAtMaxLevel) {
                    bossSpawnedAtMaxLevel = true;
                    spawnBoss();
                    // 设置下一次boss生成时间（2分钟后）
                    nextBossSpawnTime = survivalSeconds + 120;
                }
            }
            adjustMonsterCount();
            
        }
        
        // 更新存活时间（每秒+1）
        let lastSecondUpdate = 0;
        let pauseStartTime = 0;
        let totalPauseTime = 0;
        function updateSurvivalTime(nowSec) {
            if (!gameActive || liuyingClearing) return;
            if (gamePaused) {
                if (pauseStartTime === 0) pauseStartTime = nowSec;
                return;
            }
            if (pauseStartTime > 0) {
                totalPauseTime += nowSec - pauseStartTime;
                pauseStartTime = 0;
            }
            let newSeconds = Math.floor(nowSec - gameStartTime - totalPauseTime);
            if (newSeconds > survivalSeconds) {
                survivalSeconds = newSeconds;
                updateUI();
            }
        }
        
        function updateCooldowns(nowSec, deltaTime) {
            if (screenClearCooldown > 0) {
                screenClearCooldown -= deltaTime;
                if (screenClearCooldown < 0) screenClearCooldown = 0;
            }
            
            if (spawnCooldown > 0) {
                spawnCooldown -= deltaTime;
                if (spawnCooldown < 0) spawnCooldown = 0;
            }
            
            // 更新波次间隔冷却
            if (waveCooldown > 0) {
                waveCooldown -= deltaTime;
                if (waveCooldown < 0) waveCooldown = 0;
            }
            
            // 更新Boss前空闲期
            if (bossIdleTime > 0) {
                bossIdleTime -= deltaTime;
                if (bossIdleTime < 0) bossIdleTime = 0;
            }
            
            // 更新缩放动画
            if (liuyingAnimState === 'target_zoom') {
                liuyingZoomProgress += deltaTime / 0.3;
                if (liuyingZoomProgress >= 1) {
                    liuyingZoomProgress = 1;
                }
            }
        }
        
        function updateParticles() {
            for(let i=0;i<particles.length;i++){
                let p=particles[i];
                p.x+=p.vx; p.y+=p.vy;
                p.life -= 0.025;
                if(p.life<=0){ particles.splice(i,1); i--; }
            }
        }
        
        // 绘制载具瞄准标记
        function drawAimingMarkers() {
            if (!currentSelectedVehicle) return;
            
            const target = getVehicleTarget(currentSelectedVehicle.id);
            if (!target || !monsters.includes(target)) return;
            
            const now = Date.now() / 1000;
            const pulse = Math.sin(now * 5) * 0.3 + 0.7;
            
            ctx.save();
            ctx.shadowBlur = 15;
            
            if (currentSelectedVehicle.type === 'plane') {
                // 战机：小圆环
                ctx.strokeStyle = `rgba(255, 136, 102, ${pulse})`;
                ctx.shadowColor = 'rgba(255, 136, 102, 0.8)';
                ctx.lineWidth = 2;
                
                // 外圆环
                ctx.beginPath();
                ctx.arc(target.x, target.y, target.radius + 15, 0, Math.PI * 2);
                ctx.stroke();
                
                // 内圆环
                ctx.beginPath();
                ctx.arc(target.x, target.y, target.radius + 8, 0, Math.PI * 2);
                ctx.stroke();
                
                // 中心点
                ctx.fillStyle = `rgba(255, 136, 102, ${pulse})`;
                ctx.beginPath();
                ctx.arc(target.x, target.y, 3, 0, Math.PI * 2);
                ctx.fill();
                
            } else {
                // 坦克/火炮：十字标
                ctx.strokeStyle = `rgba(80, 210, 160, ${pulse})`;
                ctx.shadowColor = 'rgba(80, 210, 160, 0.8)';
                ctx.lineWidth = 2;
                
                const crossSize = target.radius + 15;
                
                // 垂直线
                ctx.beginPath();
                ctx.moveTo(target.x, target.y - crossSize);
                ctx.lineTo(target.x, target.y - target.radius - 3);
                ctx.moveTo(target.x, target.y + target.radius + 3);
                ctx.lineTo(target.x, target.y + crossSize);
                ctx.stroke();
                
                // 水平线
                ctx.beginPath();
                ctx.moveTo(target.x - crossSize, target.y);
                ctx.lineTo(target.x - target.radius - 3, target.y);
                ctx.moveTo(target.x + target.radius + 3, target.y);
                ctx.lineTo(target.x + crossSize, target.y);
                ctx.stroke();
                
                // 中心点
                ctx.fillStyle = `rgba(80, 210, 160, ${pulse})`;
                ctx.beginPath();
                ctx.arc(target.x, target.y, 4, 0, Math.PI * 2);
                ctx.fill();
                
                // 外框
                ctx.strokeStyle = `rgba(80, 210, 160, ${pulse * 0.5})`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(target.x, target.y, target.radius + 5, 0, Math.PI * 2);
                ctx.stroke();
            }
            
            ctx.restore();
        }
        
        // 绘图 (保留华丽风格)
        function draw() {
            ctx.save();
            if(screenShake>0){
                ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake);
            }

            // 绘制大地图（背景和网格）
            drawMap();

            // 应用视口偏移
            ctx.save();
            ctx.translate(-viewport.x, -viewport.y);

            // 绘制星空粒子背景
            for(let i=0;i<220;i++){
                ctx.fillStyle=`rgba(255,200,100,${0.08+Math.sin(Date.now()*0.0008+i)*0.04})`;
                ctx.fillRect((i*179)%MAP_WIDTH, (i*311)%MAP_HEIGHT, 2,2);
            }

            for(let m of monsters){
                // 使用target.png图片渲染怪物
                let size = m.radius * 2;
                if (monsterImgLoaded) {
                    ctx.drawImage(monsterImg, m.x - m.radius, m.y - m.radius, size, size);
                } else {
                    // 图片未加载完成时使用默认绘制
                    let gradMon=ctx.createRadialGradient(m.x-4,m.y-4,3,m.x,m.y,m.radius);
                    gradMon.addColorStop(0,m.color1 || "#dc5a2c");
                    gradMon.addColorStop(1,m.color2 || "#5e1c08");
                    ctx.fillStyle=gradMon;
                    ctx.beginPath(); ctx.arc(m.x,m.y,m.radius,0,Math.PI*2); ctx.fill();
                }
                
                // 显示血量
                ctx.fillStyle="#ffccaa";
                ctx.font="bold 12 monospace";
                ctx.fillText(`${Math.floor(m.hp)}`, m.x - 8, m.y + m.radius + 15);
                
                // 远程怪物标记
                if(m.isRanged){
                    ctx.fillStyle="#ffdd99";
                    ctx.font="bold 16 monospace";

            for(let p of projectiles){

                ctx.shadowBlur=10;
                ctx.beginPath(); ctx.arc(p.x,p.y,6,0,Math.PI*2); ctx.fill();
                ctx.fillStyle="#ffaa77";
                ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill();

            for(let b of bullets){

                ctx.beginPath(); ctx.arc(b.x,b.y,2.5,0,Math.PI*2); ctx.fill();
            }

            for(let t of liuying.trailPos){
                ctx.globalAlpha = t.life * 0.5;
                ctx.fillStyle="#ffaacc";
                ctx.beginPath(); ctx.ellipse(t.x, t.y, 10, 12, 0, 0, Math.PI*2); ctx.fill();
                ctx.globalAlpha=1;
            }

            if (liuyingImgLoaded) {
                ctx.save();
                ctx.translate(liuying.x, liuying.y);
                ctx.rotate(liuying.wingAngle * 0.1);

                let displayRadius = liuying.radius;
                if (liuyingAnimState === 'target_zoom') {
                    displayRadius = liuying.radius * (1 + liuyingZoomProgress * 0.5);
                }

                ctx.drawImage(liuyingImg, -displayRadius, -displayRadius, displayRadius * 2, displayRadius * 2);

            } else {
                ctx.fillStyle="#ffb7c5";
                ctx.beginPath(); ctx.ellipse(liuying.x, liuying.y, 11, 13, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle="#d46b8c";
                ctx.beginPath(); ctx.ellipse(liuying.x-2, liuying.y-3, 6, 7, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle="#000";
                ctx.beginPath(); ctx.arc(liuying.x-6, liuying.y-6, 1.2, 0, Math.PI*2); ctx.fill();
            }

            // 玩家始终在屏幕中心
            ctx.save();
            // 撤销视口变换，回到屏幕坐标系
            ctx.translate(viewport.x, viewport.y);
            
            // 屏幕中心位置
            const screenCenterX = canvas.width / 2;
            const screenCenterY = canvas.height / 2;
            const playerScreenRadius = player.radius;
            
            if (playerAvatarLoaded) {
                ctx.beginPath();
                ctx.arc(screenCenterX, screenCenterY, playerScreenRadius, 0, Math.PI * 2);
                ctx.clip();
                ctx.drawImage(playerAvatarImg, screenCenterX - playerScreenRadius, screenCenterY - playerScreenRadius, playerScreenRadius * 2, playerScreenRadius * 2);
            } else {
                ctx.fillStyle="#6dd5ff";
                ctx.beginPath(); ctx.arc(screenCenterX, screenCenterY, playerScreenRadius, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle="white";
                ctx.beginPath(); ctx.arc(screenCenterX - 5, screenCenterY - 4, 3.5, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle="#fff";
                ctx.beginPath(); ctx.arc(screenCenterX - 6, screenCenterY - 5, 1.3, 0, Math.PI*2); ctx.fill();
            }
            ctx.restore();

            for(let p of particles){
                ctx.shadowBlur = p.glow ? 6 : 2;
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size*(p.life/p.maxLife), 0, Math.PI*2);
                ctx.fill();
            }

            // 新增：绘制载具瞄准效果
            drawAimingMarkers();

            // 恢复视口偏移
            ctx.restore();

            // 绘制浮动文字（屏幕空间，需根据缩放调整位置）

                ctx.fillStyle = t.color;

                let screenY = t.y - viewport.y;
                ctx.fillText(t.msg, screenX - 50, screenY - (1-t.life)*35);
                t.life-=0.02;
                if(t.life<=0) window.floatingTexts.splice(i, 1);

            if(globalFlash>0){

                ctx.fillStyle="#50d2a0";
                ctx.textAlign="center";

            ctx.restore();
        }

        let lastTimestamp = 0;
        function gameLoop(nowMs){
            requestAnimationFrame(gameLoop);
            if(!gameStarted) {
                drawStartScreen();
                return;
            }
            let nowSec = nowMs/1000;
            let delta = Math.min(0.05, nowSec - (lastTimestamp || nowSec));
            lastTimestamp = nowSec;
            if(gameActive && !liuyingClearing){
                if(gamePaused){
                    updateSurvivalTime(nowSec); // 暂停时也要调用以记录暂停时间
                } else {
                    handlePlayerMove();
                    updateSurvivalTime(nowSec);
                    updateEntropy(nowSec);
                    if (entropyLevel >= MAX_ENTROPY_LEVEL) {
                        liuyingDamageRefreshTimer += delta;
                        if (liuyingDamageRefreshTimer >= 30) {
                            liuyingDamageRefreshTimer = 0;
                            let minuteInLevel = Math.floor(survivalSeconds / 60);
                            let timeBonus = minuteInLevel >= 1 ? 1.0 : (minuteInLevel === 0 ? 0.5 : 0);
                            if (minuteInLevel >= 2) timeBonus = minuteInLevel;
                            liuyingDamageBonus = Math.floor(bulletDamage * 0.25 * timeBonus);
                            createFloatingText(`⚡ 流萤伤害 +${liuyingDamageBonus}`, canvas.width/2, 180, "#ffcc88", 20);
                        }
                    }
                    shootAuto(nowSec);
                    updateBullets();
                    updateRangedMonsters(nowSec);
                    updateProjectiles();
                    updateMonsters();
                    updateLiuying(nowSec);
                    updateLiuyingUltimate1(nowSec);
                    updateLiuyingUltimate2(nowSec);
                    updateParticles();
                    updateCooldowns(nowSec, delta);
                    updatePlaneStrikes(nowSec); // 新增：更新战机攻击
                    updateVehicleAutoAttack(nowSec); // 新增：更新载具自动攻击
                    updateItems(nowSec, delta); // 新增：更新道具系统
                }
            } else if(liuyingClearing){
                updateParticles();
            }

            if (isReloading) updateReloadBar();
            if (isPlaneOnCooldown) updatePlaneCooldownDisplay();
            updateVehicleCooldownDisplay(); // 新增：更新载具冷却圆环显示

            draw();
            drawMinimap();
        }

        function drawStartScreen() {
            ctx.fillStyle = '#050a10';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#50d2a0';
            ctx.font = 'bold 32px monospace';

            ctx.fillText('点击"开始游戏"按钮开始', canvas.width/2, canvas.height/2);

        function checkAmmoAvailability() {
            const ownedItems = JSON.parse(localStorage.getItem('ownedItems')) || {};
            const teamSettings = JSON.parse(localStorage.getItem('vehicleTeamSettings')) || { vehicles: [] };
            const teamVehicles = (teamSettings.vehicles || []).filter(function(id) { return id && id.trim() !== ''; });
            const missingAmmo = [];

            teamVehicles.forEach(function(vehicleId) {
                const vehicle = vehicleData.find(function(v) { return v.id === vehicleId; });
                if (!vehicle) return;

                let hasAnyAmmo = false;
                const missingAmmoForVehicle = [];

                vehicle.ammo.forEach(function(ammo) {
                    // 没有 ammoId 的弹药（如无限弹药）视为有弹药
                    if (!ammo.ammoId) {
                        hasAnyAmmo = true;
                        return;
                    }
                    
                    const owned = ownedItems[ammo.ammoId] || 0;
                    if (owned > 0) {
                        hasAnyAmmo = true;
                    } else {
                        missingAmmoForVehicle.push(ammo.name);
                    }
                });

                // 只有当载具完全没有任何一种弹药可以使用时，才弹出提示
                if (!hasAnyAmmo && missingAmmoForVehicle.length > 0) {
                    missingAmmo.push({
                        vehicle: vehicle.name,
                        ammo: missingAmmoForVehicle
                    });
                }
            });

            return missingAmmo;
        }

        function showAmmoCheckDialog(missingAmmo) {
            const dialog = document.getElementById('ammoCheckDialog');
            const list = document.getElementById('ammoCheckList');

            let html = '';
            missingAmmo.forEach(function(item) {
                html += '<div class="ammo-check-item">';
                html += '<div class="ammo-check-item-vehicle">' + item.vehicle + '</div>';
                html += '<div class="ammo-check-item-ammo">缺少: ' + item.ammo.join(', ') + '</div>';
                html += '</div>';
            });

            list.innerHTML = html;
            dialog.classList.add('visible');
        }

        function hideAmmoCheckDialog() {
            const dialog = document.getElementById('ammoCheckDialog');
            dialog.classList.remove('visible');
        }

        function startGame() {

        // 游戏结束处理
        let gameEnded = false;
        let isPlayerQuit = false; // 标记是否是玩家主动退出
        
        // 累积数据（多次重启协议时累加）
        let accumulatedData = {
            currency: 0,
            exp: 0,
            killCount: 0,
            vehicleKillCount: 0,
            winCount: 0,
            loseCount: 0
        };
        
        // 弹药使用追踪
        const ammoUsageTracker = {}; // 格式: { ammoId: { name: string, count: number } }
        
        function trackAmmoUsage(ammoId, ammoName, amount = 1) {
            if (!ammoId) return;
            if (!ammoUsageTracker[ammoId]) {
                ammoUsageTracker[ammoId] = { name: ammoName, count: 0 };
            }
            ammoUsageTracker[ammoId].count += amount;
        }
        
        // 伤害追踪
        let totalDamageDealt = 0;
        
        function trackDamage(damage) {
            totalDamageDealt += damage;
        }
        
        // 保存战斗记录并累加数据（不立即结算）
        function saveBattleRecord(isQuit) {
            // 计算游戏时长
            const gameDuration = Math.floor((performance.now() / 1000) - gameStartTime);
            const minutes = Math.floor(gameDuration / 60);
            const seconds = gameDuration % 60;
            const timeStr = `${minutes}m${seconds}s`;
            
            // 游戏模式名称
            const gameMode = '无限协议';
            
            // 只有玩家主动结束才算胜利，死亡算失败
            const result = isQuit ? 'win' : 'lose';
            
            // 获取使用的载具队列
            const teamSettings = JSON.parse(localStorage.getItem('vehicleTeamSettings')) || { vehicles: [] };
            const usedVehicles = teamSettings.vehicles || [];
            
            // 记录载具详细信息
            const vehicleDetails = usedVehicles.map(vehicleId => {
                const vehicle = vehicleData.find(v => v.id === vehicleId);
                if (vehicle) {
                    return {
                        id: vehicle.id,
                        name: vehicle.name,
                        icon: vehicle.icon,
                        type: vehicle.type,
                        ammo: vehicle.ammo.map(a => ({
                            name: a.name,
                            ammoId: a.ammoId
                        }))
                    };
                }
                return null;
            }).filter(v => v !== null);
            
            // 记录弹药使用（从追踪器获取实际消耗）
            const ammoUsed = Object.values(ammoUsageTracker).map(a => ({
                name: a.name,
                count: a.count
            }));
            
            // 创建战斗记录
            const battleRecord = {
                result: result,
                time: timeStr,
                currency: currency,
                exp: gameExp,
                mode: gameMode,
                killCount: killCount,
                vehicleKillCount: vehicleKillCount,
                survivalTime: gameDuration,
                entropyLevel: entropyLevel,
                damage: totalDamageDealt,
                timestamp: Date.now(),
                vehicles: vehicleDetails,
                ammoUsed: ammoUsed,
                isPlayerQuit: isQuit
            };
            
            // 从localStorage获取现有战斗记录
            const battles = JSON.parse(localStorage.getItem('battleData')) || [];
            
            // 添加新记录到开头
            battles.unshift(battleRecord);
            
            // 只保留最近100条记录
            const recentBattles = battles.slice(0, 100);
            
            // 保存到localStorage
            localStorage.setItem('battleData', JSON.stringify(recentBattles));
            
            // 累加数据到累积变量（不立即结算到用户账户）
            accumulatedData.currency += currency;
            accumulatedData.exp += gameExp;
            accumulatedData.killCount += killCount;
            accumulatedData.vehicleKillCount += vehicleKillCount;
            if (result === 'win') {
                accumulatedData.winCount++;
            } else {
                accumulatedData.loseCount++;
            }
        }
        
        // 结算累积数据到用户账户（玩家退出游戏时调用）
        function settleAccumulatedData() {
            if (accumulatedData.currency === 0 && accumulatedData.exp === 0 &&
                accumulatedData.killCount === 0 && accumulatedData.winCount === 0 && accumulatedData.loseCount === 0) {
                return; // 没有累积数据，不需要结算
            }

            // 确保所有数值取整
            const finalCurrency = Math.floor(accumulatedData.currency);
            const finalExp = Math.floor(accumulatedData.exp);

            // 更新用户货币
            const gold = BigInt(localStorage.getItem('gold') || '0');
            localStorage.setItem('gold', (gold + BigInt(finalCurrency)).toString());
            if (finalCurrency > 0) {
                localStorage.setItem('pendingBattleCurrency', finalCurrency.toString());
            }

            // 更新用户经验
            let userLevel = parseInt(localStorage.getItem('userLevel')) || 0;
            let userExp = parseInt(localStorage.getItem('userExp')) || 0;
            userExp += finalExp;
            
            // 检查升级
            let levelUpCurrency = 0;
            let levelUpCount = 0;
            while (userExp >= calculateExpForLevel(userLevel + 1)) {
                userExp -= calculateExpForLevel(userLevel + 1);
                userLevel++;
                levelUpCount++;
                const currencyForLevel = Math.floor(100 * Math.pow(1.2, userLevel - 1));
                levelUpCurrency += currencyForLevel;
            }
            
            // 如果升级获得了货币
            if (levelUpCurrency > 0) {
                const gold = BigInt(localStorage.getItem('gold') || '0');
                localStorage.setItem('gold', (gold + BigInt(levelUpCurrency)).toString());
                localStorage.setItem('pendingLevelUpCurrency', levelUpCurrency.toString());
                localStorage.setItem('pendingLevelUpCount', levelUpCount.toString());
            }
            
            localStorage.setItem('userLevel', userLevel.toString());
            localStorage.setItem('userExp', userExp.toString());
            
            // 更新游戏次数
            const gameCount = parseInt(localStorage.getItem('userGameCount')) || 0;
            localStorage.setItem('userGameCount', (gameCount + accumulatedData.winCount + accumulatedData.loseCount).toString());
            
            // 清空累积数据

                currency: 0,

                vehicleKillCount: 0,

                loseCount: 0
