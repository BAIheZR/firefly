        // 更新用户统计数据
        function updateUserStats(battle) {
            // 更新等级和经验
            let userLevel = parseInt(localStorage.getItem('userLevel')) || 0;
            let userExp = parseInt(localStorage.getItem('userExp')) || 0;
            
            // 使用游戏中的实时经验（已应用道具倍数）
            userExp += battle.exp;
            
            // 通关获得经验（胜利时）
            if (battle.result === 'win') {
                userExp += 50;
            }
            
            // 检查升级并计算升级获得的货币
            let levelUpCurrency = 0;
            let levelUpCount = 0;
            while (userExp >= calculateExpForLevel(userLevel + 1)) {
                userExp -= calculateExpForLevel(userLevel + 1);
                userLevel++;
                levelUpCount++;
                // 计算升级获得的货币：1级100，每升一级增加20%
                const currencyForLevel = Math.floor(100 * Math.pow(1.2, userLevel - 1));
                levelUpCurrency += currencyForLevel;
            }
            
            // 如果升级获得了货币，保存到localStorage
            if (levelUpCurrency > 0) {
                const gold = BigInt(localStorage.getItem('gold') || '0');
                localStorage.setItem('gold', (gold + BigInt(levelUpCurrency)).toString());
                // 保存升级获得的货币到pending，用于UI显示
                localStorage.setItem('pendingLevelUpCurrency', levelUpCurrency.toString());
                localStorage.setItem('pendingLevelUpCount', levelUpCount.toString());
            }
            
            localStorage.setItem('userLevel', userLevel.toString());
            localStorage.setItem('userExp', userExp.toString());
            
            // 更新偏好模式和最近游玩
            const modeCount = JSON.parse(localStorage.getItem('userModeCount')) || {};
            modeCount[battle.mode] = (modeCount[battle.mode] || 0) + 1;
            localStorage.setItem('userModeCount', JSON.stringify(modeCount));
            
            // 设置最近游玩模式
            localStorage.setItem('userRecentMode', battle.mode);
            
            // 计算偏好模式（玩得最多的模式）
            let preferredMode = battle.mode;
            let maxCount = 1;
            for (const [mode, count] of Object.entries(modeCount)) {
                if (count > maxCount) {
                    maxCount = count;
                    preferredMode = mode;
                }
            }
            localStorage.setItem('userPreferredMode', preferredMode);
            
            // 更新用户货币（将本局获得的货币添加到总余额）
            const gold = BigInt(localStorage.getItem('gold') || '0');
            localStorage.setItem('gold', (gold + BigInt(battle.currency)).toString());
            
            // 如果本局获得了货币，保存到pending用于UI显示
            if (battle.currency > 0) {
                localStorage.setItem('pendingBattleCurrency', battle.currency.toString());
            }
            
            // 更新游戏次数
            const gameCount = parseInt(localStorage.getItem('userGameCount')) || 0;
            localStorage.setItem('userGameCount', (gameCount + 1).toString());
            
            // 检查成就
            checkAchievements(battle, gameCount);
        }
        
        // 检查成就条件
        function checkAchievements(battle, gameCount) {
            const unlocked = getUnlockedAchievements();
            const newAchievements = [];
            
            // 1. 初来乍到 - 第一次打开游戏（在inMaxNineUI中触发）
            
            // 2. 第'一'次？战斗！ - 首次完成任意游戏并结束
            if (!unlocked.includes('medal_one_xie') && gameCount === 1) {
                newAchievements.push('medal_one_xie');
            }
            
            // 3. 怪诞达人 - 在同协中击杀150个敌人以上并完成游戏
            if (!unlocked.includes('medal_one_xie_main') && battle.killCount >= 150) {
                newAchievements.push('medal_one_xie_main');
            }
            
            // 4. 战斗大师 - 完成10场战斗，每次结束时货币至少1500
            if (!unlocked.includes('medal_two_xie') && gameCount >= 10 && battle.currency >= 1500) {
                // 检查前10场是否都满足货币条件
                const battles = JSON.parse(localStorage.getItem('battleData')) || [];
                const last10Battles = battles.slice(0, 10);
                const allMeetCurrency = last10Battles.every(b => b.currency >= 1500);
                if (allMeetCurrency) {
                    newAchievements.push('medal_two_xie');
                }
            }
            
            // 5. 超级怪诞 - 在同协中击杀500个敌人以上并完成游戏
            if (!unlocked.includes('medal_two_xie_main') && battle.killCount >= 500) {
                newAchievements.push('medal_two_xie_main');
            }
            
            // 如果有新成就，保存并更新
            if (newAchievements.length > 0) {
                const allUnlocked = [...unlocked, ...newAchievements];
                saveUnlockedAchievements(allUnlocked);
                
                // 保存待显示的成就队列
                localStorage.setItem('pendingAchievements', JSON.stringify(newAchievements));
            }
        }

        // 计算升级所需经验
        function calculateExpForLevel(level) {
            if (level <= 1) return 100;
            return Math.floor(100 * Math.pow(1.5, level - 1));
        }

                if(attackKey === 'Mouse1') return 0;
                if(attackKey === 'Mouse2') return 1;
                if(attackKey === 'Mouse3') return 2;
                if(attackKey === 'Mouse4') return 3;
                if(attackKey === 'Mouse5') return 4;
                return -1;
            }
            
            canvas.addEventListener('mousedown',e=>{
                let attackBtn = getAttackButton(coopKeys.attackKey);

            });

                let attackBtn = getAttackButton(coopKeys.attackKey);

            });

            // ------------------- 移动端触摸控制 -------------------
            let joystickActive = false;
            let joystickStartX = 0;
            let joystickStartY = 0;
            let stickElement = document.getElementById('joystickStick');
            let joystickContainer = document.getElementById('joystick');

            // 虚拟摇杆触摸事件
            if(stickElement) {
                stickElement.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    joystickActive = true;
                    stickElement.classList.add('active');
                    const touch = e.touches[0];
                    joystickStartX = touch.clientX;
                    joystickStartY = touch.clientY;
                });

                document.addEventListener('touchmove', (e) => {
                    if(!joystickActive) return;
                    
                    const touch = e.touches[0];
                    const deltaX = touch.clientX - joystickStartX;
                    const deltaY = touch.clientY - joystickStartY;
                    const maxDist = 55;
                    
                    const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
                    const normalizedDistance = Math.min(distance, maxDist);
                    
                    if(normalizedDistance > 0) {
                        const angle = Math.atan2(deltaY, deltaX);
                        const moveX = Math.cos(angle) * normalizedDistance;
                        const moveY = Math.sin(angle) * normalizedDistance;
                        
                        stickElement.style.transform = `translate(calc(-50% + ${moveX}px), calc(-50% + ${moveY}px))`;
                        
                        // 更新按键状态
                        const threshold = 12;
                        keys.w = deltaY < -threshold;
                        keys.s = deltaY > threshold;
                        keys.a = deltaX < -threshold;
                        keys.d = deltaX > threshold;
                    }
                });

                document.addEventListener('touchend', () => {
                    if(joystickActive) {
                        joystickActive = false;
                        stickElement.classList.remove('active');
                        stickElement.style.transform = 'translate(-50%, -50%)';
                        keys.w = false;
                        keys.s = false;
                        keys.a = false;
                        keys.d = false;
                    }
                });
            }

            // 移动端按钮点击事件
            document.getElementById('mobileShoot')?.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if(gameActive) {

                if(ammoDialog) {
                    ammoDialog.classList.toggle('visible');
                }
            });

            // 触摸射击区域（屏幕点击射击）
            const touchShootArea = document.getElementById('touchShootArea');
            touchShootArea?.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if(gameActive) {
                    const touch = e.touches[0];
                    const touchX = touch.clientX;
                    const joystickRect = joystickContainer?.getBoundingClientRect();
                    
                    // 检查是否点击在摇杆区域外
                    if(joystickRect) {
                        const isInJoystick = touchX >= joystickRect.left && touchX <= joystickRect.right &&
                                            touch.clientY >= joystickRect.top && touch.clientY <= joystickRect.bottom;
                        
                        if(!isInJoystick) {
                            shootOnce();
                        }
                    } else {
                        shootOnce();
                    }
                }
            });
            
            canvas.addEventListener('contextmenu',e=>e.preventDefault());
            
            // 小地图拖动功能
            let isDragging = false;
            let dragOffset = { x: 0, y: 0 };
            
            minimapCanvas.addEventListener('mousedown', (e) => {
                e.stopPropagation();
                e.preventDefault();
                isDragging = true;
                // 清除所有可能冲突的定位属性
                minimapCanvas.style.right = 'auto';
                const rect = minimapCanvas.getBoundingClientRect();
                dragOffset.x = e.clientX - rect.left;
                dragOffset.y = e.clientY - rect.top;
                minimapCanvas.style.zIndex = '2000';
            });
            
            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                
                let newX = e.clientX - dragOffset.x;
                let newY = e.clientY - dragOffset.y;
                
                // 限制在屏幕范围内
                newX = Math.max(0, Math.min(newX, window.innerWidth - minimapCanvas.width));
                newY = Math.max(0, Math.min(newY, window.innerHeight - minimapCanvas.height));
                
                minimapCanvas.style.left = newX + 'px';
                minimapCanvas.style.top = newY + 'px';
            });
            
            window.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    minimapCanvas.style.zIndex = '1000';
                }
            });

            });

        updateVehiclePanel();

        // 开始载具自动攻击
        let vehicleAutoAttack = {}; // {vehicleId: {isActive, lastAutoShot, firstShotFired}} 
        
        // 开始载具自动攻击
        function startVehicleAutoAttack(vehicleId) {
            if (!vehicleAutoAttack[vehicleId]) {
                vehicleAutoAttack[vehicleId] = { isActive: true, lastAutoShot: 0, firstShotFired: false };
            } else {
                vehicleAutoAttack[vehicleId].isActive = true;
                vehicleAutoAttack[vehicleId].firstShotFired = false; // 重置第一发状态
            }
        }
        
        // 停止载具自动攻击
        function stopVehicleAutoAttack(vehicleId) {

        // 更新载具冷却圆环显示
        function updateVehicleCooldownDisplay() {
            const slots = document.querySelectorAll('.vehicle-slot');
            slots.forEach((slot, index) => {
                const canvas = slot.querySelector('.vehicle-cooldown-canvas');
                if (!canvas) return;
                
                const ctx = canvas.getContext('2d');
                // 清空画布
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // 检查是否有载具且正在冷却
                const teamSettings = JSON.parse(localStorage.getItem('vehicleTeamSettings')) || { vehicles: [] };
                const teamVehicles = (teamSettings.vehicles || []).filter(function(id) { return id && id.trim() !== ''; });
                const vehicleId = teamVehicles[index];
                
                if (!vehicleId) return;
                
                const vehicle = vehicleData.find(function(v) { return v.id === vehicleId; });
                if (!vehicle) return;
                
                // 检查冷却状态
                const autoAttack = vehicleAutoAttack[vehicleId];
                if (!autoAttack || !autoAttack.isActive) return;
                
                const nowSec = performance.now() / 1000;
                const fireRate = vehicle.fireRate || 1;
                const elapsed = nowSec - autoAttack.lastAutoShot;
                const remaining = Math.max(0, fireRate - elapsed);
                const progress = 1 - (remaining / fireRate);
                
                if (progress >= 1) return; // 冷却完成
                
                // 绘制冷却圆环
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                const radius = Math.min(canvas.width, canvas.height) / 2 - 2;
                
                // 绘制背景圆环（半透明）
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.lineWidth = 4;
                ctx.stroke();
                
                // 绘制冷却进度圆环
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * (1 - progress));
                ctx.strokeStyle = '#ff6b6b';
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.stroke();
                
                // 显示剩余时间
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(Math.ceil(remaining) + 's', centerX, centerY);
            });
        }
        
        // 处理停止载具攻击（按钮和快捷键通用）
        function handleStopVehicleAttack() {
            if (!currentSelectedVehicle) {
                createFloatingText('请先选择载具!', player.x, player.y - 30, '#ff8866', 14);
                return;
            }
            
            const vehicleId = currentSelectedVehicle.id;
            const autoAttack = vehicleAutoAttack[vehicleId];
            
            if (autoAttack && autoAttack.isActive) {
                stopVehicleAutoAttack(vehicleId);
                setVehicleTarget(vehicleId, null); // 清除瞄准目标
                createFloatingText('已停止载具攻击', player.x, player.y - 30, '#ff8866', 14);
            } else {
                createFloatingText('载具未在攻击中', player.x, player.y - 30, '#aaaaaa', 14);
            }
        }
        
        // 更新载具自动攻击
        function updateVehicleAutoAttack(nowSec) {
            if (!currentSelectedVehicle) return;
            const vehicleId = currentSelectedVehicle.id;
            const autoAttack = vehicleAutoAttack[vehicleId];
            if (!autoAttack || !autoAttack.isActive) return;
            
            // 检查载具是否可以攻击
            if (!canFire()) return;
            
            // 获取载具的冷却时间（fireRate就是冷却时间，单位秒）
            let fireInterval = getFireRate();
            if (currentSelectedVehicle.type === 'plane') return; // 战机使用特殊的攻击系统
            
            // 坦克和火炮：第一发可以立即发射（炮膛里有一发），之后才需要冷却
            const isTankOrArtillery = currentSelectedVehicle.type === 'tank' || currentSelectedVehicle.type === 'artillery';
            if (!autoAttack.firstShotFired && isTankOrArtillery) {
                // 第一发：立即发射
            } else {
                // 非第一发或非坦克/火炮：检查冷却时间
                if (nowSec - autoAttack.lastAutoShot < fireInterval) return;
            }
            
            if (monsters.length === 0) return;
            
            // 确保有目标（随机选择）
            const target = ensureVehicleHasTarget(vehicleId);
            if (!target) return;
            
            // 检查弹药是否足够
            if (!consumeAmmo()) {
                stopVehicleAutoAttack(vehicleId);
                return;
            }
            
            // 射击
            autoAttack.lastAutoShot = nowSec;
            autoAttack.firstShotFired = true; // 标记第一发已发射
            vehicleLastShotTime[vehicleId] = nowSec;
            
            // 获取弹药效果
            const state = vehicleAmmoState[currentSelectedVehicle.id];
            const ammoIdx = state ? state.selectedAmmoIndex : 0;
            const ammoConfig = currentSelectedVehicle.ammo[ammoIdx];
            let bulletEffect = ammoConfig ? ammoConfig.effect : null;
            // 优先使用弹药中定义的damage值，否则使用默认值
            let damage = ammoConfig && ammoConfig.damage ? ammoConfig.damage : bulletDamage;
            
            // 根据弹药类型设置伤害值
            if (ammoConfig) {
                if (ammoConfig.name.includes('高爆弹')) {
                    // 火炮高爆弹100血，其他高爆弹50血
                    if (currentSelectedVehicle.type === 'artillery' || ammoConfig.name.includes('火炮')) {
                        damage = 100;
                    } else {
                        damage = 50;
                    }
                } else if (ammoConfig.name.includes('钢针弹') || ammoConfig.name.includes('APFSDS')) {
                    damage = 25;
                } else if (ammoConfig.name.includes('导弹')) {
                    damage = 75;
                } else if (ammoConfig.name.includes('破甲弹') || ammoConfig.name.includes('HEAT')) {
                    damage = 75;
                    bulletEffect = 'armorPenetration'; // 标记为破甲弹
                }
            }
            
            // 检查是否是秒杀弹药且不是boss
            const isInstantKill = (ammoConfig && (
                ammoConfig.name.includes('火炮高爆弹') || 
                ammoConfig.name.includes('导弹') || 
                ammoConfig.name.includes('破甲弹') ||
                ammoConfig.name.includes('KH-29') ||
                ammoConfig.name.includes('雷石') ||
                ammoConfig.name.includes('GBU-39') ||
                ammoConfig.name.includes('小牛') ||
                ammoConfig.name.includes('铁锤') ||
                ammoConfig.name.includes('SPACE250')
            )) && !target.isBoss;
            
            // 检查是否有范围伤害（splashRadius）
            const splashRadius = ammoConfig && ammoConfig.splashRadius ? ammoConfig.splashRadius : 0;
            
            // 即时造成伤害
            if (isInstantKill) {
                target.hp = 0;
                createFloatingText('💥秒杀!', target.x, target.y - 20, '#ff4444', 16);
                // 秒杀时记录目标最大血量作为伤害
                trackDamage(target.maxHp || damage);
                
                // 范围伤害处理（秒杀弹药也有范围效果）
                if (splashRadius > 0) {
                    applySplashDamage(target.x, target.y, splashRadius, damage, target, vehicleId);
                }
            } else {
                // 破甲弹对重甲目标造成额外伤害
                let finalDamage = damage;
                if (bulletEffect === 'armorPenetration' && target.isHeavyArmor) {
                    finalDamage = 175;
                }
                target.hp -= finalDamage;
                trackDamage(finalDamage);
                createFloatingText('-' + finalDamage, target.x, target.y - 15, '#ff6666', 14);
                
                // 范围伤害处理
                if (splashRadius > 0) {
                    applySplashDamage(target.x, target.y, splashRadius, damage, target, vehicleId);
                }
            }
            
            // 应用眩晕效果
            if (bulletEffect === 'stun' && !target.isBoss) {
                target.stunnedUntil = nowSec + 5; // 眩晕5秒
            }
            
            // 检查是否击杀
            if (target.hp <= 0) {
                // 载具击杀效果
                vehicleKillCount = (vehicleKillCount || 0) + 1;
                createFloatingText('🎯' + currentSelectedVehicle.name + '击杀!', target.x, target.y - 25, '#50d2a0', 14);
                createFloatingText('+' + Math.floor(10 + entropyLevel * 1.5) + ' 积分', target.x, target.y - 10, '#ffee88', 12);
                
                // 找到目标索引并击杀
                const idx = monsters.indexOf(target);
                if (idx !== -1) {
                    killMonster(idx, false);
                }
                
                // 立即选择新目标（用于小地图显示）
                if (monsters.length > 0) {
                    const newTarget = selectRandomTarget();
                    setVehicleTarget(vehicleId, newTarget);
                } else {
                    setVehicleTarget(vehicleId, null);
                }
            }
            
            // 创建击中特效
            createExplosion(target.x, target.y, "#ffaa55", 8, 1.5);
            
            // 创建范围伤害特效
            if (splashRadius > 0) {
                // 范围伤害圈特效
                for (let i = 0; i < 12; i++) {
                    const angle = (i / 12) * Math.PI * 2;
                    const px = target.x + Math.cos(angle) * splashRadius;
                    const py = target.y + Math.sin(angle) * splashRadius;
                    createExplosion(px, py, "#ff4400", 3, 1);
                }
            }
            
            // 开始冷却（使用载具的fireRate作为冷却时间）
            startReload(fireInterval);
        }
        
        // 范围伤害处理函数
        function applySplashDamage(centerX, centerY, radius, maxDamage, originalTarget, vehicleId) {
            for (let i = monsters.length - 1; i >= 0; i--) {
                const monster = monsters[i];
                if (monster === originalTarget) continue; // 跳过原始目标
                
                const dx = monster.x - centerX;
                const dy = monster.y - centerY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance <= radius) {
                        // 根据距离计算伤害（中心100%，边缘50%）
                        const damageRatio = 1 - (distance / radius) * 0.5;
                        const splashDamage = Math.floor(maxDamage * damageRatio);
                        
                        monster.hp -= splashDamage;
                        trackDamage(splashDamage);
                        createFloatingText('-' + splashDamage, monster.x, monster.y - 15, '#ffaa00', 12);
                    
                    // 检查是否击杀
                    if (monster.hp <= 0) {
                        vehicleKillCount = (vehicleKillCount || 0) + 1;
                        createFloatingText('🎯' + (currentSelectedVehicle ? currentSelectedVehicle.name : '载具') + '击杀!', monster.x, monster.y - 25, '#50d2a0', 14);
                        createFloatingText('+' + Math.floor(10 + entropyLevel * 1.5) + ' 积分', monster.x, monster.y - 10, '#ffee88', 12);
                        killMonster(i, false);
                    }
                }
            }
        }
        
        // 随机选择一个怪物作为目标（整个地图范围）
        function selectRandomTarget() {
            if (monsters.length === 0) return null;
            const randomIndex = Math.floor(Math.random() * monsters.length);
            return monsters[randomIndex];
        }
        
        // 为载具设置瞄准目标
        function setVehicleTarget(vehicleId, target) {
            if (!target) {
                delete vehicleTargets[vehicleId];
            } else {
                vehicleTargets[vehicleId] = target;
            }
        }
        
        // 获取载具的当前瞄准目标
        function getVehicleTarget(vehicleId) {
            const target = vehicleTargets[vehicleId];
            // 检查目标是否还存在
            if (target && !monsters.includes(target)) {
                delete vehicleTargets[vehicleId];
                return null;
            }
            return target;
        }
        
        // 获取玩家的当前瞄准目标
        function getPlayerTarget() {
            // 检查目标是否还存在
            if (playerTarget && !monsters.includes(playerTarget)) {
                playerTarget = null;
                return null;
            }
            return playerTarget;
        }
        
        // 设置玩家的瞄准目标
        function setPlayerTarget(target) {
            playerTarget = target;
        }
        
        // 确保载具拥有一个瞄准目标
        function ensureVehicleHasTarget(vehicleId) {
            let target = getVehicleTarget(vehicleId);
            if (!target && monsters.length > 0) {
                target = selectRandomTarget();
                setVehicleTarget(vehicleId, target);
            }
            return target;
        }

        function getAmmoCountFromInventory(ammoId) {
            if (!ammoId) return Infinity;
            const ownedItems = JSON.parse(localStorage.getItem('ownedItems')) || {};
            return ownedItems[ammoId] || 0;
        }

        function saveAmmoCountToInventory(ammoId, count) {
            if (!ammoId) return;
            const ownedItems = JSON.parse(localStorage.getItem('ownedItems')) || {};
            ownedItems[ammoId] = count;
            localStorage.setItem('ownedItems', JSON.stringify(ownedItems));
        }

        function showAmmoDialog(vehicle, slotIndex) {
            const dialog = document.getElementById('ammoDialog');
            const title = document.getElementById('ammoDialogTitle');
            const container = document.getElementById('ammoSlotsContainer');
            const reloadContainer = document.getElementById('reloadBarContainer');
            const reloadFill = document.getElementById('reloadBarFill');
            const cooldownDisplay = document.getElementById('planeCooldownDisplay');

            title.textContent = vehicle.name + ' - 弹药选择';

            if (!vehicleAmmoState[vehicle.id]) {
                vehicleAmmoState[vehicle.id] = {
                    selectedAmmoIndex: 0,
                    ammoCounts: vehicle.ammo.map(function(a) { 
                        return getAmmoCountFromInventory(a.ammoId);
                    })
                };
            }
            const state = vehicleAmmoState[vehicle.id];

            // 更新弹药数量为当前仓库中的数量
            vehicle.ammo.forEach(function(a, idx) {
                state.ammoCounts[idx] = getAmmoCountFromInventory(a.ammoId);
            });

            container.innerHTML = '';

            if (vehicle.type === 'plane') {
                reloadContainer.style.display = 'none';
                if (isPlaneOnCooldown && planeCooldownDuration > 0) {
                    cooldownDisplay.style.display = 'block';
                    updatePlaneCooldownDisplay();
                } else {
                    cooldownDisplay.style.display = 'none';
                }
            } else {
                cooldownDisplay.style.display = 'none';
                if (isReloading && reloadDuration > 0) {
                    reloadContainer.style.display = 'block';
                    updateReloadBar();
                } else {
                    reloadContainer.style.display = 'none';
                }
            }

            vehicle.ammo.forEach(function(ammo, idx) {
                const count = state.ammoCounts[idx];
                // 只显示仓库中有数量的弹药（数量 > 0 或无限）
                if (count !== Infinity && count <= 0) {
                    return;
                }

                const slot = document.createElement('div');
                slot.className = 'ammo-slot';
                if (idx === state.selectedAmmoIndex) {
                    slot.classList.add('selected');
                }

                const nameSpan = document.createElement('span');
                nameSpan.className = 'ammo-name';
                // 钢针类弹药简化显示为"钢针弹"
                const displayName = ammo.name.includes('钢针') ? '钢针弹' : ammo.name;
                nameSpan.textContent = displayName;

                const countSpan = document.createElement('span');
                countSpan.className = 'ammo-count';
                if (count === Infinity) {
                    countSpan.textContent = '∞';
                } else {
                    countSpan.textContent = 'x' + count;
                }

                slot.appendChild(nameSpan);
                slot.appendChild(countSpan);

                slot.addEventListener('click', function() {
                    if (count <= 0 && state.ammoCounts[idx] <= 0) return;
                    state.selectedAmmoIndex = idx;
                    currentSelectedAmmoIndex = idx;
                    updateAmmoDialogDisplay();
                    createFloatingText('已选择: ' + ammo.name, player.x, player.y - 30, '#88ccff', 16);
                });

                container.appendChild(slot);
            });

            dialog.classList.add('visible');
        }

        function updateAmmoDialogDisplay() {
            if (!currentSelectedVehicle) return;
            const state = vehicleAmmoState[currentSelectedVehicle.id];
            // 更新弹药数量为当前仓库中的数量
            currentSelectedVehicle.ammo.forEach(function(a, idx) {
                state.ammoCounts[idx] = getAmmoCountFromInventory(a.ammoId);
            });
            const slots = document.querySelectorAll('.ammo-slot');
            slots.forEach(function(slot, idx) {
                slot.classList.remove('selected');
                const count = state.ammoCounts[idx];
                if (idx === state.selectedAmmoIndex) {
                    slot.classList.add('selected');
                }
                if (count <= 0) {
                    slot.classList.add('disabled');
                } else {
                    slot.classList.remove('disabled');
                }
                const countSpan = slot.querySelector('.ammo-count');
                if (countSpan) {
                    countSpan.textContent = count === Infinity ? '∞' : 'x' + count;
                }
            });
        }

        function updateReloadBar() {
            if (!isReloading || reloadDuration <= 0) return;
            const elapsed = (performance.now() / 1000) - reloadStartTime;
            const progress = Math.min(100, (elapsed / reloadDuration) * 100);
            const fill = document.getElementById('reloadBarFill');
            if (fill) {
                fill.style.width = progress + '%';
            }
            if (elapsed >= reloadDuration) {
                isReloading = false;
                document.getElementById('reloadBarContainer').style.display = 'none';
            }
        }

        function updatePlaneCooldownDisplay() {
            if (!isPlaneOnCooldown || planeCooldownDuration <= 0) return;
            const elapsed = (performance.now() / 1000) - planeCooldownStart;
            const remaining = Math.max(0, planeCooldownDuration - elapsed);
            const progress = Math.min(100, (elapsed / planeCooldownDuration) * 100);
            
            const fill = document.getElementById('cooldownBarFill');
            const remainingText = document.getElementById('cooldownRemaining');
            
            if (fill) {
                fill.style.width = progress + '%';
            }
            if (remainingText) {
                remainingText.textContent = '剩余: ' + Math.ceil(remaining) + 's';
            }
            if (remaining <= 0) {
                isPlaneOnCooldown = false;
                document.getElementById('planeCooldownDisplay').style.display = 'none';
            }
        }

            }
        });

        let lastSelectedVehicleIndex = -1;

        function selectVehicle(index) {
            const teamSettings = JSON.parse(localStorage.getItem('vehicleTeamSettings')) || { vehicles: [] };
            const teamVehicles = (teamSettings.vehicles || []).filter(function(id) { return id && id.trim() !== ''; });
            const vehicleId = teamVehicles[index];
            if (!vehicleId) return;

            const vehicle = vehicleData.find(function(v) { return v.id === vehicleId; });
            if (!vehicle) return;

            const slots = document.querySelectorAll('.vehicle-slot');
            slots.forEach(function(s, i) {
                if (i === index) {
                    s.style.borderColor = '#ffdd77';
                    s.style.boxShadow = '0 0 15px rgba(255, 220, 120, 0.5)';
                } else {
                    s.style.borderColor = '';
                    s.style.boxShadow = '';
                }
            });

            if (lastSelectedVehicleIndex === index) {
                closeAmmoDialog();
                lastSelectedVehicleIndex = -1;
                return;
            }

            lastSelectedVehicleIndex = index;
            currentSelectedVehicle = vehicle;
            
            // 初始化载具弹药状态，默认选择第一个弹药
            if (!vehicleAmmoState[vehicle.id]) {
                vehicleAmmoState[vehicle.id] = {
                    selectedAmmoIndex: 0, // 默认选择第一个弹药
                    ammoCounts: vehicle.ammo.map(function(a) { 
                        return getAmmoCountFromInventory(a.ammoId);
                    })
                };
            }
            
            currentSelectedAmmoIndex = vehicleAmmoState[vehicle.id].selectedAmmoIndex;
            createFloatingText('已选择: ' + vehicle.name, player.x, player.y - 30, '#ffdd77', 18);

            if (vehicle.type === 'plane') {
                if (isPlaneOnCooldown) {
                    createFloatingText('战机冷却中: ' + Math.ceil(planeCooldownDuration - (performance.now() / 1000 - planeCooldownStart)) + 's', player.x, player.y - 60, '#ff8866', 14);
                }
            }

            showAmmoDialog(vehicle, index);
        }

        function selectAmmo(index) {
            if (!currentSelectedVehicle) return;
            const state = vehicleAmmoState[currentSelectedVehicle.id];
            if (!state) return;
            const count = state.ammoCounts[index];
            if (count <= 0) {
                createFloatingText('弹药不足!', player.x, player.y - 30, '#ff4444', 16);
                return;
            }
            state.selectedAmmoIndex = index;
            currentSelectedAmmoIndex = index;
            updateAmmoDialogDisplay();
            const ammoName = currentSelectedVehicle.ammo[index] ? currentSelectedVehicle.ammo[index].name : '未知';
            createFloatingText('弹药: ' + ammoName, player.x, player.y - 30, '#88ccff', 16);
        }

        function consumeAmmo() {
            if (!currentSelectedVehicle) return true;
            const state = vehicleAmmoState[currentSelectedVehicle.id];
            if (!state) return true;
            const count = state.ammoCounts[state.selectedAmmoIndex];
            if (count <= 0) return false;

            // 每次只消耗1发弹药
            const consumeAmount = 1;

            if (count !== Infinity) {
                // 检查是否有足够的弹药
                if (count < consumeAmount) {
                    createFloatingText('弹药不足!', player.x, player.y - 30, '#ff4444', 16);
                    return false;
                }
                
                state.ammoCounts[state.selectedAmmoIndex] -= consumeAmount;
                // 同步更新仓库中的弹药数量
                const ammoConfig = currentSelectedVehicle.ammo[state.selectedAmmoIndex];
                if (ammoConfig && ammoConfig.ammoId) {
                    // 追踪弹药使用
                    trackAmmoUsage(ammoConfig.ammoId, ammoConfig.name, consumeAmount);
                    saveAmmoCountToInventory(ammoConfig.ammoId, state.ammoCounts[state.selectedAmmoIndex]);
                }
                // 检查是否耗尽
                if (state.ammoCounts[state.selectedAmmoIndex] === 0) {
                    const ammoName = ammoConfig ? ammoConfig.name : '未知';
                    showAmmoEmptyNotification(currentSelectedVehicle.name, ammoName);
                }
            }

            updateAmmoDialogDisplay();
            return true;
        }

        function startReload(duration) {
            reloadStartTime = performance.now() / 1000;
            reloadDuration = duration;
            isReloading = true;
            const container = document.getElementById('reloadBarContainer');
            const fill = document.getElementById('reloadBarFill');
            container.style.display = 'block';
            fill.style.width = '0%';
        }

        function startPlaneCooldown(duration) {
            planeCooldownStart = performance.now() / 1000;
            planeCooldownDuration = duration;
            isPlaneOnCooldown = true;
            const display = document.getElementById('planeCooldownDisplay');
            display.style.display = 'block';
            updatePlaneCooldownDisplay();
        }

        function canFire() {
            if (!currentSelectedVehicle) return true;
            if (currentSelectedVehicle.type === 'plane') {
                return !isPlaneOnCooldown;
            }
            if (isReloading) return false;
            const state = vehicleAmmoState[currentSelectedVehicle.id];
            if (!state) return true;
            return state.ammoCounts[state.selectedAmmoIndex] > 0;
        }

        function getFireRate() {
            if (!currentSelectedVehicle) return 5;
            return currentSelectedVehicle.fireRate || 5;
        }

        function getAmmoReloadTime(ammoIdx) {
            if (!currentSelectedVehicle) return 5;
            const ammo = currentSelectedVehicle.ammo[ammoIdx];
            if (!ammo) return 5;
            return ammo.reloadTime || currentSelectedVehicle.fireRate || 5;
        }

        function shootOnce() {
            if (!gameActive || liuyingClearing) return;
            if (!canFire()) {
                if (isReloading) createFloatingText('装填中...', player.x, player.y - 30, '#ff8866', 14);
                else if (isPlaneOnCooldown) createFloatingText('战机冷却中', player.x, player.y - 30, '#ff8866', 14);
                else createFloatingText('弹药不足!', player.x, player.y - 30, '#ff4444', 14);
                return;
            }
            mouseDown = true;
            var nowSec = performance.now() / 1000;

            if (currentSelectedVehicle && currentSelectedVehicle.type === 'plane') {
                const state = vehicleAmmoState[currentSelectedVehicle.id];
                const ammoIdx = state ? state.selectedAmmoIndex : 0;
                const ammoConfig = currentSelectedVehicle.ammo[ammoIdx];
                const totalShots = ammoConfig ? (ammoConfig.count || 1) : 1;
                
                // 战机一次性消耗所有弹药
                const ammoId = ammoConfig.ammoId;
                const currentAmmoCount = ammoId ? getAmmoCountFromInventory(ammoId) : Infinity;
                
                if (currentAmmoCount < totalShots && currentAmmoCount !== Infinity) {
                    createFloatingText('弹药不足! 需要' + totalShots + '发', player.x, player.y - 30, '#ff4444', 14);
                    mouseDown = false;
                    return;
                }
                
                // 消耗所有弹药
                if (ammoId && currentAmmoCount !== Infinity) {
                    saveAmmoCountToInventory(ammoId, currentAmmoCount - totalShots);
                }
                
                startPlaneCooldown(currentSelectedVehicle.cooldown || 60);
                createFloatingText('战机出击! 挂载x' + totalShots, player.x, player.y - 30, '#ffaa66', 18);
                
                // 创建战机攻击任务
                const targets = [];
                // 为每发弹药选择一个目标（可以重复选择）
                for (let i = 0; i < totalShots; i++) {
                    const target = selectRandomTarget();
                    if (target) {
                        targets.push(target);
                    }
                }
                // 如果没有足够的目标，用重复的目标填充
                while (targets.length < totalShots && monsters.length > 0) {
                    const target = selectRandomTarget();
                    if (target) {
                        targets.push(target);
                    }
                }
                
                activePlaneStrikes.push({
                    vehicleId: currentSelectedVehicle.id,
                    ammoConfig: ammoConfig,
                    remainingShots: totalShots,
                    targets: targets,
                    currentTargetIndex: 0,
                    lastShotTime: nowSec,
                    shotInterval: 0.3 // 每0.3秒发射一发
                });
                
                // 为战机设置第一个瞄准目标
                if (targets.length > 0) {
                    setVehicleTarget(currentSelectedVehicle.id, targets[0]);
                }
                
                mouseDown = false;
                return;
            }

            // 坦克/火炮：切换自动攻击状态
            if (currentSelectedVehicle && (currentSelectedVehicle.type === 'tank' || currentSelectedVehicle.type === 'artillery')) {
                const vehicleId = currentSelectedVehicle.id;
                const autoAttack = vehicleAutoAttack[vehicleId];
                
                if (autoAttack && autoAttack.isActive) {
                    // 停止自动攻击
                    stopVehicleAutoAttack(vehicleId);
                    createFloatingText('停止自动攻击', player.x, player.y - 30, '#ffaa66', 14);
                } else {
                    // 开始自动攻击
                    startVehicleAutoAttack(vehicleId);
                    createFloatingText('开始自动攻击!', player.x, player.y - 30, '#50d2a0', 14);
                }
                
                mouseDown = false;
                return;
            }

            if (currentSelectedVehicle && currentSelectedVehicle.type === 'tank') {
                const ammoIdx = vehicleAmmoState[currentSelectedVehicle.id] ? vehicleAmmoState[currentSelectedVehicle.id].selectedAmmoIndex : 0;
                if (currentSelectedVehicle.id === 'vehicle_6' && ammoIdx === 1) {
                    missileShotCount++;
                    if (missileShotCount >= 2) {
                        missileShotCount = 0;
                        startReload(missileReloadDuration);
                        createFloatingText('导弹装填中...', player.x, player.y - 30, '#ff8866', 14);
                    } else {
                        startReload(getAmmoReloadTime(ammoIdx));
                    }
                } else {
                    startReload(getFireRate());
                }
            }

            shootAuto(nowSec);
            setTimeout(function() { mouseDown = false; }, 100);
        }
        
        // 更新正在进行的战机攻击
        function updatePlaneStrikes(nowSec) {
            for (let i = activePlaneStrikes.length - 1; i >= 0; i--) {
                const strike = activePlaneStrikes[i];
                
                // 检查是否需要发射下一发
                if (strike.remainingShots > 0 && 
                    nowSec - strike.lastShotTime >= strike.shotInterval &&
                    monsters.length > 0) {
                    
                    // 获取当前目标
                    let target = strike.targets[strike.currentTargetIndex];
                    // 如果目标已死亡，选择新目标
                    if (!target || !monsters.includes(target)) {
                        target = selectRandomTarget();
                        strike.targets[strike.currentTargetIndex] = target;
                    }
                    
                    if (target) {
                            // 更新瞄准目标
                            setVehicleTarget(strike.vehicleId, target);
                            
                            // 检查是否是秒杀弹药且不是boss
                            const isInstantKill = (strike.ammoConfig && (
                                strike.ammoConfig.name.includes('KH-29') ||
                                strike.ammoConfig.name.includes('雷石') ||
                                strike.ammoConfig.name.includes('GBU-39') ||
                                strike.ammoConfig.name.includes('小牛') ||
                                strike.ammoConfig.name.includes('铁锤') ||
                                strike.ammoConfig.name.includes('SPACE250')
                            )) && !target.isBoss;
                            
                            // 即时造成伤害
                            if (isInstantKill) {
                                target.hp = 0;
                                createFloatingText('💥秒杀!', target.x, target.y - 20, '#ff4444', 16);
                            } else {
                                target.hp -= bulletDamage;
                                createFloatingText('-' + bulletDamage, target.x, target.y - 15, '#ff6666', 14);
                            }
                            
                            // 检查是否击杀
                            if (target.hp <= 0) {
                                // 载具击杀效果
                                vehicleKillCount = (vehicleKillCount || 0) + 1;
                                createFloatingText('🎯战机击杀!', target.x, target.y - 25, '#50d2a0', 14);
                                createFloatingText('+' + Math.floor(10 + entropyLevel * 1.5) + ' 积分', target.x, target.y - 10, '#ffee88', 12);
                                
                                // 找到目标索引并击杀
                                const idx = monsters.indexOf(target);
                                if (idx !== -1) {
                                    killMonster(idx, false);
                                }
                            }
                            
                            // 创建击中特效
                            createExplosion(target.x, target.y, "#ffaa55", 8, 1.5);
                            
                            strike.remainingShots--;
                            strike.currentTargetIndex++;
                            strike.lastShotTime = nowSec;
                        }
                }
                
                // 如果攻击完成，移除该任务
                if (strike.remainingShots <= 0) {
                    delete vehicleTargets[strike.vehicleId];
                    activePlaneStrikes.splice(i, 1);
                }
            }
        }

        // ---------- 道具系统 ----------
        const itemData = {
            'item_2': {
                name: '双倍金币卡',
                icon: '../../img/key/item_coins_double.png',
                iconType: 'image',
                fallbackIcon: 'coins',
                description: '一局游戏金币翻倍',
                duration: 0, // 0表示持续到游戏结束
                type: 'currency',
                multiplier: 2
            },
            'item_3': {
                name: '经验药水',
                icon: '../../img/key/item_exp.png',
                iconType: 'image',
                fallbackIcon: 'flask',
                description: '获得额外50%经验',
                duration: 0, // 0表示持续到游戏结束
                type: 'exp',
                multiplier: 1.5
            },
            'item_4': {
                name: '四倍货币卡',
                icon: '../../img/key/item_coins_quad.png',
                iconType: 'image',
                fallbackIcon: 'coins',
                description: '一局游戏金币翻四倍',
                duration: 0, // 0表示持续到游戏结束
                type: 'currency',
                multiplier: 4
            },
            'item_5': {
                name: '难度保持卡(1分钟)',
                icon: '../../img/key/item_clock_1.png',
                iconType: 'image',
                fallbackIcon: 'clock',
                description: '一分钟内难度不增加',
                duration: 60,
                type: 'difficulty_keep'
            },
            'item_6': {
                name: '难度保持卡(3分钟)',
                icon: '../../img/key/item_clock_3.png',
                iconType: 'image',
                fallbackIcon: 'clock',
                description: '三分钟内难度不增加',
                duration: 180,
                type: 'difficulty_keep'
            },
            'item_7': {
                name: '难度保持卡(5分钟)',
                icon: '../../img/key/item_clock_5.png',
                iconType: 'image',
                fallbackIcon: 'clock',
                description: '五分钟内难度不增加',
                duration: 300,
                type: 'difficulty_keep'
            },
            'item_8': {
                name: '难度保持卡(10分钟)',
                icon: '../../img/key/item_clock_10.png',
                iconType: 'image',
                fallbackIcon: 'clock',
                description: '十分钟内难度不增加',
                duration: 600,
                type: 'difficulty_keep'
            },
            'item_9': {
                name: '经验加成卡(10%)',
                icon: '../../img/key/item_exp_10.png',
                iconType: 'image',
                fallbackIcon: 'flask',
                description: '获得额外10%经验',
                duration: 0,
                type: 'exp',
                multiplier: 1.1
            },
            'item_10': {
                name: '经验加成卡(20%)',
                icon: '../../img/key/item_exp_20.png',
                iconType: 'image',
                fallbackIcon: 'flask',
                description: '获得额外20%经验',
                duration: 0,
                type: 'exp',
                multiplier: 1.2
            },
            'item_11': {
                name: '经验加成卡(50%)',
                icon: '../../img/key/item_exp_50.png',
                iconType: 'image',
                fallbackIcon: 'flask',
                description: '获得额外50%经验',
                duration: 0,
                type: 'exp',
                multiplier: 1.5
            },
            'item_12': {
                name: '经验加成卡(100%)',
                icon: '../../img/key/item_exp_100.png',
                iconType: 'image',
                fallbackIcon: 'flask',
                description: '获得额外100%经验',
                duration: 0,
                type: 'exp',
                multiplier: 2.0
            }
        };

        let activeItems = {};
        let itemDurations = {};

        function loadOwnedItems() {
            const ownedItems = JSON.parse(localStorage.getItem('ownedItems')) || {};
            const container = document.getElementById('itemSlotsContainer');
            let hasItems = false;
            
            let html = '';
            for (const itemId in itemData) {
                const count = ownedItems[itemId] || 0;
                if (count > 0) {
                    hasItems = true;
                    const item = itemData[itemId];
                    const isActive = activeItems[itemId];
                    const remainingTime = itemDurations[itemId] || 0;
                    
                    // 根据icon类型生成icon HTML，图片加载失败时回退到fontawesome
                    const iconHtml = item.iconType === 'image' 
                        ? `<img src="${item.icon}" alt="${item.name}" style="width: 28px; height: 28px; object-fit: contain;" onerror="this.onerror=null;this.src='';this.outerHTML='<i class=\\'fas fa-${item.fallbackIcon}\\' style=\\'font-size: 20px;\\'></i>';">`
                        : `<i class="fas fa-${item.icon}" style="font-size: 20px;"></i>`;
                    
                    html += `
                        <div class="item-slot ${isActive ? 'active' : ''}" data-item-id="${itemId}">
                            <div class="item-icon">${iconHtml}</div>
                            <div class="item-info">
                                <div class="item-name">${item.name}</div>
                                <div class="item-count">x${count}</div>
                                ${isActive && item.duration > 0 ? `<div class="item-duration">剩余: ${Math.ceil(remainingTime)}s</div>` : ''}
                                ${isActive && item.duration === 0 ? `<div class="item-duration" style="color: #50d2a0;">持续生效</div>` : ''}
                            </div>
                            <div class="item-description">${item.description}</div>
                        </div>
                    `;
                }
            }
            
            if (!hasItems) {
                html = '<div class="no-items-message">暂无道具</div>';
            }
            
            container.innerHTML = html;
            
            // 添加点击事件 - 道具只能通过鼠标点击使用
            document.querySelectorAll('.item-slot').forEach(slot => {
                slot.addEventListener('click', function() {
                    const itemId = this.getAttribute('data-item-id');
                    useItem(itemId);
                });
            });
        }

        function useItem(itemId) {
            if (!gameActive) {
                createFloatingText('游戏未开始!', canvas.width/2, 100, '#ff4444', 18);
                return;
            }
            
            if (activeItems[itemId]) {
                createFloatingText('该道具已在使用中!', canvas.width/2, 100, '#ff8844', 18);
                return;
            }
            
            const ownedItems = JSON.parse(localStorage.getItem('ownedItems')) || {};
            if (!ownedItems[itemId] || ownedItems[itemId] <= 0) {
                createFloatingText('道具不足!', canvas.width/2, 100, '#ff4444', 18);
                return;
            }
            
            // 检查是否有同类型道具正在使用（同类道具不可叠加使用）
            const item = itemData[itemId];
            for (const activeId in activeItems) {
                if (activeItems[activeId]) {
                    const activeItem = itemData[activeId];
                    if (activeItem.type === item.type) {
                        createFloatingText('同类道具已在生效中!', canvas.width/2, 100, '#ff8844', 18);
                        return;
                    }
                }
            }
            
            // 消耗道具
            ownedItems[itemId]--;
            localStorage.setItem('ownedItems', JSON.stringify(ownedItems));
            
            // 激活道具效果
            activeItems[itemId] = true;
            if (item.duration > 0) {
                itemDurations[itemId] = item.duration;
            }
            
            // 显示提示
            const durationText = item.duration === 0 ? '（持续到游戏结束）' : `（${item.duration}秒）`;
            createFloatingText(`✅ ${item.name} 已激活${durationText}!`, canvas.width/2, 100, '#50d2a0', 20);
            
            // 更新显示
            loadOwnedItems();
        }

        function updateItemDurations(deltaTime) {
            for (const itemId in activeItems) {
                if (activeItems[itemId]) {
                    const item = itemData[itemId];
                    // 只有有时间限制的道具才需要更新时间
                    if (item.duration > 0 && itemDurations[itemId] > 0) {
                        itemDurations[itemId] -= deltaTime;
                        if (itemDurations[itemId] <= 0) {
                            // 道具效果结束
                            activeItems[itemId] = false;
                            itemDurations[itemId] = 0;
                            createFloatingText(`⏰ ${item.name} 效果结束!`, canvas.width/2, 100, '#ffdd77', 18);
                        }
                    }
                }
            }
        }

        function getItemMultiplier(itemType) {
            for (const itemId in activeItems) {
                if (activeItems[itemId]) {
                    const item = itemData[itemId];
                    if (item.type === itemType && item.multiplier) {
                        return item.multiplier;
                    }
                }
            }
            return 1;
        }

        function isDifficultyKept() {
            for (const itemId in activeItems) {
                if (activeItems[itemId]) {
                    const item = itemData[itemId];
                    if (item.type === 'difficulty_keep') {
                        return true;
                    }
                }
            }
            return false;
        }

        // 游戏结束时重置道具状态
        function resetItemState() {
            activeItems = {};
            itemDurations = {};
        }

        // 游戏循环中更新道具
        function updateItems(nowSec, deltaTime) {
            if (gameActive && !gamePaused) {
                updateItemDurations(deltaTime);
                loadOwnedItems(); // 更新显示
            }
        }

        // 将道具系统暴露到全局，供其他游戏使用
        window.GameItemSystem = {
            itemData: itemData,
            activeItems: activeItems,
            itemDurations: itemDurations,
            loadOwnedItems: loadOwnedItems,
            useItem: useItem,
            getItemMultiplier: getItemMultiplier,
            isDifficultyKept: isDifficultyKept,
            resetItemState: resetItemState,
            updateItems: updateItems
        };

        requestAnimationFrame(gameLoop);

        function applyPageBackground(pageName) {
            const pageBackgrounds = JSON.parse(localStorage.getItem('pageBackgrounds')) || {};
            if (pageBackgrounds[pageName]) {
                document.body.style.background = `url(${pageBackgrounds[pageName]}) center/cover no-repeat fixed`;
            } else {
                document.body.style.background = 'linear-gradient(180deg, #4AB8A0 0%, #000000 100%)';
            }
        }
        window.addEventListener('DOMContentLoaded', function() {
            applyPageBackground('game');
        });
        
        // 页面关闭/刷新时自动保存游戏数据
        window.addEventListener('beforeunload', function(e) {
            // 如果游戏已经开始过，需要保存数据
            if (gameStarted) {
                // 保存当前游戏的数据（即使游戏未主动结束）
                if (gameActive && survivalSeconds > 0) {
                    saveBattleRecord(true); // 算作主动退出
                }
                // 结算所有累积数据
                settleAccumulatedData();
            }
        });
    })();
</script>
