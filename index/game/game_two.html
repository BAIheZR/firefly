<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>像素远征·黄昏潮汐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0a1428;
            min-height: 100vh;
            display: flex;
            justify-content: stretch;
            align-items: flex-start;
            font-family: 'Courier New', 'VT323', monospace;
            padding: 0;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 0;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 32px;
            padding: 0;
            backdrop-filter: blur(3px);
            border: 1px solid #ffcf9a;
            width: 90%;
            height: 90%;
            margin: 0 auto;
        }

        canvas {
            display: block;
            margin: 0;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            border-radius: 16px;
            cursor: crosshair;
            background: #b3d4b0;
            width: 100%;
            flex: 1;
            max-width: 100%;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 100%;
            background: #1e1b2cee;
            padding: 8px 20px;
            border-radius: 80px;
            backdrop-filter: blur(6px);
            border: 1px solid #ffcd94;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stats {
            display: flex;
            gap: 28px;
            color: #ffeaac;
            text-shadow: 0 2px 0 #5a2d0c;
            font-size: 20px;
            background: #00000077;
            padding: 4px 24px;
            border-radius: 48px;
        }

        .stats span {
            background: #231f2e;
            padding: 4px 16px;
            border-radius: 36px;
            font-family: monospace;
        }

        .timer-box {
            background: #2a2538;
            padding: 4px 20px;
            border-radius: 50px;
            color: #ffd966;
            font-weight: bold;
            font-size: 18px;
        }

        .controls-info {
            display: flex;
            gap: 20px;
            color: #ffecb3;
            font-size: 12px;
            background: #0b0820;
            padding: 5px 24px;
            border-radius: 60px;
        }

        .controls-info kbd {
            background: #02010f;
            border-radius: 8px;
            padding: 2px 10px;
            font-weight: bold;
            color: #ffcc77;
            margin: 0 4px;
            box-shadow: inset 0 1px 0 #6f5e3a, 0 1px 0 #000;
        }

        button {
            background: #efb87e;
            border: none;
            font-family: monospace;
            font-weight: bold;
            font-size: 16px;
            padding: 5px 28px;
            border-radius: 60px;
            color: #1f1a1a;
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: 0 4px 0 #8b5a2b;
        }
        button:active { transform: translateY(2px); box-shadow: 0 1px 0 #8b5a2b; }

        .game-status {
            font-size: 16px;
            font-weight: bold;
            background: #000000aa;
            padding: 5px 26px;
            border-radius: 60px;
            color: #ffd58c;
        }

        .hp-bar {
            display: inline-block;
            width: 80px;
            height: 12px;
            background: #333;
            border-radius: 6px;
            overflow: hidden;
            vertical-align: middle;
            margin: 0 5px;
            border: 1px solid #666;
        }

        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #ffaa00);
            border-radius: 4px;
            transition: width 0.2s ease;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <canvas id="gameCanvas" width="1000" height="520"></canvas>
    <div class="info-panel">
        <button id="backBtn">返回主页</button>
        <div class="timer-box">
            时间: <span id="gameTimer">0</span>s
        </div>
        <div class="controls-info">
            <span><kbd id="keyMove">W A S D</kbd> 移动</span>
            <span><kbd>左键</kbd> 烈焰斩</span>
            <span><kbd id="keyFire">Z</kbd> 火球 <kbd id="keyStorm">X</kbd> 烈焰风暴</span>
            <span><kbd id="keyRestart">R</kbd> 重生</span>
        </div>
        <button id="startBtn">开始游戏</button>
        <button id="pauseBtn" style="display: none;">暂停</button>
        <button id="resetBtn" style="display: none;">重铸黎明</button>
    </div>
</div>

<script>
    (function(){
        // ------------------- 画布 & 无限相机核心 -------------------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;
        const VIEW_W = 1000, VIEW_H = 520;
        const GROUND_Y = VIEW_H - 58;
        
        // 从设置中加载自定义按键
        function loadPixelControls() {
            const settings = JSON.parse(localStorage.getItem('userSettings')) || {};
            return {
                up: settings.pixelUpKey || 'W',
                down: settings.pixelDownKey || 'S',
                left: settings.pixelLeftKey || 'A',
                right: settings.pixelRightKey || 'D',
                fire: settings.pixelFireKey || 'Z',
                firestorm: settings.pixelFirestormKey || 'X',
                restart: settings.pixelRestartKey || 'R',
                pause: settings.pixelPauseKey || 'Esc'
            };
        }
        
        let pixelKeys = loadPixelControls();
        
        // 更新控制提示显示
        function updateControlsDisplay() {
            pixelKeys = loadPixelControls();
            const keyMoveEl = document.getElementById('keyMove');
            const keyFireEl = document.getElementById('keyFire');
            const keyStormEl = document.getElementById('keyStorm');
            const keyRestartEl = document.getElementById('keyRestart');
            
            if (keyMoveEl) keyMoveEl.textContent = `${pixelKeys.up} ${pixelKeys.left} ${pixelKeys.down} ${pixelKeys.right}`;
            if (keyFireEl) keyFireEl.textContent = pixelKeys.fire;
            if (keyStormEl) keyStormEl.textContent = pixelKeys.firestorm;
            if (keyRestartEl) keyRestartEl.textContent = pixelKeys.restart;
        }
        
        // 页面加载时更新显示
        updateControlsDisplay();
        
        let worldOffsetX = 0;       // 摄像机偏移
        
        // 图片资源
        let playerSprites = { zhanl: [], walk: [], hit: [] };
        let enemyImage = null;
        let animFrame = 0;
        let animFrameTimer = 0;
        
        // 加载玩家站立序列图 (zhanl文件夹)
        for(let i=0; i<8; i++) {
            let img = new Image();
            img.src = '../../img/game_img/game_two/zhanl/sprite-' + i + '.png';
            playerSprites.zhanl.push(img);
        }
        
        // 加载玩家走动序列图 (walk文件夹)
        for(let i=0; i<8; i++) {
            let img = new Image();
            img.src = '../../img/game_img/game_two/walk/sprite-' + i + '.png';
            playerSprites.walk.push(img);
        }
        
        // 加载玩家攻击序列图 (hit文件夹)
        for(let i=0; i<2; i++) {
            let img = new Image();
            img.src = '../../img/game_img/game_two/hit/sprite-' + i + '.png';
            playerSprites.hit.push(img);
        }
        
        // 加载怪物图片
        enemyImage = new Image();
        enemyImage.src = '../../img/game_img/game_two/target.png';
        
        // 玩家
        let player = {
            worldX: 0,
            y: GROUND_Y - 70,
            vx: 0, vy: 0,
            width: 60, height: 70,
            facingRight: true,
            hp: 100, maxHp: 100,
            mp: 100, maxMp: 130,
            invincibleTimer: 0,
            attackTimer: 0,
            attackCooldown: 0,
            skillEffectTimer: 0,
            grounded: false,
            maxSpeed: 5.8,
            acc: 0.94,
            friction: 0.88,
            jumpPower: -9.2,
            gravity: 0.55,
            manaRegen: 0.48
        };
        
        // ---------- 怪物系统 ----------
        class PixelMob {
            constructor(worldX, typeVariant) {
                this.worldX = worldX;
                this.y = GROUND_Y - 60;
                this.width = 50;
                this.height = 60;
                // 类型: brute / stalker / reaver
                let r = typeVariant !== undefined ? typeVariant : Math.random();
                if(r < 0.35) this.type = 'brute';
                else if(r < 0.65) this.type = 'stalker';
                else this.type = 'reaver';
                
                if(this.type === 'brute') { this.hp = 5; this.maxHp=5; this.damage=2; this.speed=0.82; }
                else if(this.type === 'stalker') { this.hp=3; this.maxHp=3; this.damage=1; this.speed=1.65; }
                else { this.hp=4; this.maxHp=4; this.damage=1; this.speed=1.15; }
                this.vx = 0;
                this.hitTimer = 0;
                this.attackCooldown = 0; // 攻击冷却时间 (帧数)
                this.color = this.type === 'brute' ? '#b45f2b' : (this.type === 'stalker' ? '#3c886b' : '#8f5f9e');
            }
        }
        
        let enemies = [];
        let projectiles = [];
        let particles = [];
        
        // 游戏核心状态
        let gameActive = true;
        let gamePaused = false;
        let score = 0;
        let combo = 0;
        let comboTimer = 0;
        
        // ---------- 随时间变化 怪物生成越来越密集 ----------
        let gameTimeSeconds = 0;        // 精确计时 (秒)
        let lastTimestamp = 0;
        let spawnAccumulator = 0;
        let baseSpawnInterval = 2.2;    // 初始每2.2秒生成一波
        let currentSpawnInterval = 2.2;
        let waveIntensity = 1;           // 强度系数 影响同时生成数量
        let maxEnemiesLimit = 8;          // 动态上限会随难度微调
        
        // UI元素
        function updateUI() {
            let timerSpan = document.getElementById('gameTimer');
            if(timerSpan) timerSpan.innerText = Math.floor(gameTimeSeconds);
            
            let pauseBtn = document.getElementById('pauseBtn');
            if(gameActive && !gamePaused) pauseBtn.style.display = 'inline-block';
            else pauseBtn.style.display = 'none';
        }
        
        // 难度动态: 随着时间推移 每分钟增加强度
        function updateDifficultyByTime(deltaSec) {
            if(!gameActive) return;
            gameTimeSeconds += deltaSec;
            // 每过60秒 (1分钟) 强度 +1，且刷新间隔缩短
            let rawIntensity = 1 + Math.floor(gameTimeSeconds / 60);
            waveIntensity = Math.min(9, rawIntensity);     // 最高9级潮位
            // 生成间隔从2.2秒逐渐降低到0.75秒 (激烈)
            let t = Math.min(1.0, gameTimeSeconds / 210);
            currentSpawnInterval = 2.2 - t * 1.55;
            if(currentSpawnInterval < 0.75) currentSpawnInterval = 0.75;
            maxEnemiesLimit = 6 + Math.floor(waveIntensity * 0.7);
            if(maxEnemiesLimit > 15) maxEnemiesLimit = 15;
            updateUI();
        }
        
        // 生成怪物: 根据强度同时生成1~1+额外数量
        function spawnEnemiesByWave() {
            if(!gameActive) return;
            let currentCount = enemies.length;
            let maxAllowed = maxEnemiesLimit;
            if(currentCount >= maxAllowed + 2) return;
            // 生成数量 = 基础1只 + 额外强度加成 (最多同时刷3~4只)
            let baseSpawn = 1;
            let extra = Math.floor(waveIntensity / 2.5);
            let spawnCount = Math.min(4, baseSpawn + extra);
            if(spawnCount > maxAllowed - currentCount && maxAllowed - currentCount > 0) spawnCount = maxAllowed - currentCount;
            if(spawnCount <= 0) return;
            
            // 左右两侧随机生成，避免挤在一起
            for(let i=0;i<spawnCount;i++) {
                let side = Math.random() < 0.5 ? -1 : 1;
                let spawnX = player.worldX + side * (320 + Math.random() * 180);
                // 避免生成在玩家脸上
                if(Math.abs(spawnX - player.worldX) < 70) spawnX += (side * 130);
                // 随机类型微调
                let r = Math.random();
                let mob = new PixelMob(spawnX, r);
                enemies.push(mob);
            }
        }
        
        // 自动生成计时器 (基于真实时间)
        let lastFrameTime = performance.now();
        function updateSpawningTimer(now) {
            if(!gameActive) return;
            let delta = Math.min(0.05, (now - lastFrameTime) / 1000);
            if(delta <= 0) return;
            updateDifficultyByTime(delta);
            spawnAccumulator += delta;
            let interval = Math.max(0.65, currentSpawnInterval);
            while(spawnAccumulator >= interval && gameActive) {
                spawnEnemiesByWave();
                spawnAccumulator -= interval;
            }
            lastFrameTime = now;
        }
        
        // 重置游戏全部状态 (时间归零)
        function resetGame() {
            gameActive = true;
            score = 0;
            combo = 0;
            comboTimer = 0;
            gameTimeSeconds = 0;
            waveIntensity = 1;
            currentSpawnInterval = 2.2;
            spawnAccumulator = 0;
            lastFrameTime = performance.now();
            
            player = {
                worldX: 0, y: GROUND_Y - 46,
                vx: 0, vy: 0,
                width: 38, height: 46,
                facingRight: true,
                hp: 6, maxHp: 6,
                mp: 100, maxMp: 130,
                invincibleTimer: 0,
                attackTimer: 0,
                attackCooldown: 0,
                skillEffectTimer: 0,
                grounded: false,
                maxSpeed: 5.8,
                acc: 0.94,
                friction: 0.88,
                jumpPower: -9.2,
                gravity: 0.55,
                manaRegen: 0.48
            };
            enemies = [];
            projectiles = [];
            particles = [];
            // 开局只生成1~2只怪物，按首次低潮位
            let initCount = 1 + (Math.random() > 0.6 ? 1 : 0);
            for(let i=0;i<initCount;i++) {
                let side = Math.random() < 0.5 ? -1 : 1;
                let spawnX = player.worldX + side * (280 + Math.random() * 150);
                enemies.push(new PixelMob(spawnX, Math.random()));
            }
            updateUI();
        }
        
        // 摄像机跟随
        function updateCamera() {
            let targetOffset = player.worldX - VIEW_W/2;
            worldOffsetX += (targetOffset - worldOffsetX) * 0.12;
        }
        function worldToScreen(worldX) { return worldX - worldOffsetX; }
        
        // ---------- 攻击判定 (大范围) ----------
        function performAttack(baseDamage, mpCost, skillType) {
            if(!gameActive) return false;
            if(player.attackCooldown > 0) return false;
            if(mpCost > 0 && player.mp < mpCost) {
                addFloatingText(player.worldX, player.y-25, "💧体力不足", "#ffaa88");
                return false;
            }
            if(mpCost > 0) player.mp -= mpCost;
            player.attackTimer = 9;
            player.attackCooldown = (skillType === 'normal') ? 14 : 24;
            if(skillType !== 'normal') player.skillEffectTimer = 12;
            
            let attackW = 84, attackH = 62;
            let attackX = player.worldX + (player.facingRight ? player.width-12 : -attackW+28);
            let attackRect = { x: attackX, y: player.y+8, w: attackW, h: attackH };
            let comboBonus = 1 + Math.min(0.9, combo / 15);
            let finalDamage = baseDamage * comboBonus;
            let hitCount = 0;
            
            for(let i=0;i<enemies.length;i++) {
                let e = enemies[i];
                let eRect = { x: e.worldX, y: e.y, w: e.width, h: e.height };
                if(rectCollide(attackRect, eRect)) {
                    let dmg = finalDamage * (e.type === 'brute' ? 0.85 : (e.type === 'stalker' ? 1.1 : 1));
                    e.hp -= dmg;
                    e.hitTimer = 9;
                    let dir = (e.worldX+e.width/2) < (player.worldX+player.width/2) ? -1 : 1;
                    e.vx = dir * 4.2;
                    combo++; comboTimer = 42;
                    addPixelExplosion(e.worldX+e.width/2, e.y+15, "#ffaa66");
                    player.mp = Math.min(player.maxMp, player.mp + 2.8);
                    hitCount++;
                    if(skillType === 'frost') { e.vx *= 0.5; addPixelExplosion(e.worldX+e.width/2, e.y+12, "#88ccff"); }
                    if(skillType === 'storm') { addPixelExplosion(e.worldX+e.width/2, e.y+8, "#ff88aa"); }
                }
            }
            // 清理死亡
            for(let i=enemies.length-1;i>=0;i--) {
                let e = enemies[i];
                if(e.hp <= 0) {
                    let bonus = 20 + (e.type === 'brute' ? 25 : (e.type === 'stalker' ? 15 : 20));
                    score += bonus;
                    addFloatingText(e.worldX+15, e.y-12, `+${bonus}`, "#ffdd99");
                    player.mp = Math.min(player.maxMp, player.mp + 7);
                    if(player.hp < player.maxHp && Math.random()<0.2) player.hp = Math.min(player.maxHp, player.hp+1);
                    addKill();
                    enemies.splice(i,1);
                }
            }
            if(skillType === 'lightning') {
                for(let i=enemies.length-1;i>=0;i--) {
                    if(i < enemies.length) {
                        enemies[i].hp -= 1.8;
                        if(enemies[i].hp <= 0) {
                            score += 18;
                            addKill();
                            enemies.splice(i,1);
                        }
                    }
                }
                addPixelExplosion(player.worldX+player.width/2, player.y+8, "#ffffaa");
            }
            if(hitCount>0) updateUI();
            return hitCount>0;
        }
        function normalAttack() { 
            console.log('Attack triggered');
            performAttack(4.5, 0, 'normal'); 
        }
        // 火球术 - 发射火球攻击敌人
        function skillFireball() { 
            if(player.mp < 18) { addFloatingText(player.worldX+20,player.y-22,"🔥灵力不足","#ff6633"); return; }
            if(player.attackCooldown > 0) return;
            player.mp -= 18; player.attackCooldown = 22; player.skillEffectTimer = 10;
            let proj = {
                worldX: player.facingRight ? player.worldX+player.width-8 : player.worldX-38,
                y: player.y+20, vx: player.facingRight ? 12 : -12, vy: 0,
                width: 38, height: 24, life: 30, damage: 6.5, type: 'fireball'
            };
            projectiles.push(proj);
            addFireballEffect(); // 添加火球特效
            player.attackTimer = 7;
            updateUI();
        }
        
        // 烈焰风暴 - 旋转火焰攻击周围敌人
        function skillFirestorm() {
            if(player.mp < 24) { addFloatingText(player.worldX+20,player.y-22,"🔥灵力不足","#ff6633"); return; }
            if(player.attackCooldown > 0) return;
            player.mp -= 24; player.attackCooldown = 30; player.skillEffectTimer = 15;
            
            addFirestormEffect(); // 添加烈焰风暴特效
            
            // 对周围敌人造成伤害并击退
            let fireRadius = 100;
            for(let e of enemies) {
                let dx = (e.worldX + e.width/2) - (player.worldX + player.width/2);
                let dy = (e.y + e.height/2) - (player.y + player.height/2);
                let dist = Math.sqrt(dx*dx + dy*dy);
                
                if(dist < fireRadius) {
                    e.hp -= 7.5 * (1 + combo/20);
                    e.hitTimer = 15;
                    let knockback = (dist > 0) ? 4 / dist : 0;
                    e.vx = dx * knockback;
                    e.vy = -3;
                    addPixelExplosion(e.worldX+e.width/2, e.y+12, "#ff6600");
                }
            }
            for(let i=enemies.length-1;i>=0;i--) if(enemies[i].hp<=0) { score+=20; addKill(); enemies.splice(i,1); }
            player.attackTimer = 10;
            updateUI();
        }
        
        // 辅助
        function rectCollide(r1,r2) { return !(r2.x > r1.x+r1.w || r2.x+r2.w < r1.x || r2.y > r1.y+r1.h || r2.y+r2.h < r1.y); }
        function addPixelExplosion(wx,wy,color) { for(let i=0;i<8;i++) particles.push({worldX:wx+(Math.random()-0.5)*14, y:wy+(Math.random()-0.5)*12, vx:(Math.random()-0.5)*2.3, vy:(Math.random()-0.5)*2-0.5, life:12, color:color, size:4}); }
        function addFloatingText(wx,wy,text,color) { particles.push({worldX:wx, y:wy, text:text, color:color, life:20, isText:true}); }
        
        // 物理移动 (WASD)
        let keys = { w:false, s:false, a:false, d:false, space:false };
        function handleMovement() {
            if(!gameActive) return;
            if(keys.a) { player.vx = Math.max(-player.maxSpeed, player.vx - player.acc); player.facingRight = false; }
            if(keys.d) { player.vx = Math.min(player.maxSpeed, player.vx + player.acc); player.facingRight = true; }
            if(player.grounded) player.vx *= player.friction;
            else player.vx *= 0.99;
            player.vx = Math.min(player.maxSpeed, Math.max(-player.maxSpeed, player.vx));
            player.vy += player.gravity;
            player.worldX += player.vx;
            player.y += player.vy;
            if(player.y + player.height >= GROUND_Y && player.vy >= 0) {
                player.y = GROUND_Y - player.height; player.vy = 0; player.grounded = true;
            } else player.grounded = false;
            if(player.y < 20) player.y = 20;
            if((keys.w || keys.space) && player.grounded && player.attackCooldown < 8) {
                player.vy = player.jumpPower; player.grounded = false;
            }
        }
        
        function updateEnemies() {
            for(let e of enemies) {
                if(e.hitTimer > 0) e.hitTimer--;
                if(e.attackCooldown > 0) e.attackCooldown--;
                let delta = player.worldX - e.worldX;
                let dir = delta > 0 ? 1 : -1;
                e.vx += dir * 0.22 * e.speed;
                e.vx = Math.min(e.speed*1.5, Math.max(-e.speed*1.5, e.vx));
                e.worldX += e.vx; e.vx *= 0.94;
                e.y = GROUND_Y - e.height;
            }
        }
        
        function handleCollisionDamage() {
            if(!gameActive) return;
            for(let e of enemies) {
                let pRect = { x: player.worldX, y: player.y, w: player.width, h: player.height };
                let eRect = { x: e.worldX, y: e.y, w: e.width, h: e.height };
                if(rectCollide(pRect, eRect)) {
                    // 怪物攻击冷却时间为1.5秒（90帧）
                    if(player.invincibleTimer <= 0 && player.hp > 0 && e.attackCooldown <= 0) {
                        player.hp = Math.max(0, player.hp - e.damage);
                        updateUI();
                        player.invincibleTimer = 28;
                        e.attackCooldown = 90; // 1.5秒 = 90帧 (60fps)
                        addPixelExplosion(player.worldX+player.width/2, player.y+12, "#ff7777");
                        if(player.hp <= 0) { gameOver(); return; }
                    }
                    // 只处理重叠分离，不再额外推动玩家
                    let overlap = (player.width/2+e.width/2) - Math.abs((player.worldX+player.width/2)-(e.worldX+e.width/2));
                    if(overlap>0) {
                        let dp = (player.worldX+player.width/2) < (e.worldX+e.width/2) ? -1 : 1;
                        player.worldX += dp * overlap*0.55;
                        e.worldX -= dp * overlap*0.55;
                    }
                }
            }
        }
        
        function updateTimers() {
            if(player.invincibleTimer > 0) player.invincibleTimer--;
            if(player.attackTimer > 0) player.attackTimer--;
            if(player.attackCooldown > 0) player.attackCooldown--;
            if(player.skillEffectTimer > 0) player.skillEffectTimer--;
            if(comboTimer > 0) { comboTimer--; if(comboTimer<=0) combo=0; } else combo=0;
            if(player.mp < player.maxMp) player.mp = Math.min(player.maxMp, player.mp + player.manaRegen * 0.72);
            updateUI();
        }
        
        function updateProjectiles() {
            for(let i=0;i<projectiles.length;i++) {
                let p = projectiles[i];
                p.worldX += p.vx; p.life--;
                for(let j=0;j<enemies.length;j++) {
                    let e = enemies[j];
                    if(rectCollide({x:p.worldX,y:p.y,w:p.width,h:p.height},{x:e.worldX,y:e.y,w:e.width,h:e.height})) {
                        e.hp -= p.damage; e.hitTimer = 8;
                        addPixelExplosion(e.worldX+e.width/2, e.y+12, "#88ddff");
                        e.vx = p.vx > 0 ? 3.5 : -3.5;
                        combo++; comboTimer = 40;
                        player.mp = Math.min(player.maxMp, player.mp+2.5);
                        p.life = 0; break;
                    }
                }
                if(p.life <=0 || p.worldX > player.worldX+1300 || p.worldX < player.worldX-1300) { projectiles.splice(i,1); i--; }
            }
            for(let i=enemies.length-1;i>=0;i--) if(enemies[i].hp<=0) { addKill(); enemies.splice(i,1); updateUI();}
        }
        
        function updateParticles() {
            for(let i=0;i<particles.length;i++) {
                let p = particles[i];
                p.life--;
                if(!p.isText) { p.worldX += p.vx; p.y += p.vy; p.vy += 0.2; }
                if(p.life<=0) { particles.splice(i,1); i--; }
            }
        }
        
        // 像素绘图风格 (白昼草地)
        function drawBackground() {
            let grad = ctx.createLinearGradient(0,0,0,VIEW_H);
            grad.addColorStop(0,"#c3e6cb"); grad.addColorStop(0.7,"#f1f7b0");
            ctx.fillStyle = grad; ctx.fillRect(0,0,VIEW_W,VIEW_H);
            let startTile = Math.floor(worldOffsetX / 68);
            for(let i=-2;i<18;i++) {
                let tileX = (startTile + i) * 68;
                let sx = worldToScreen(tileX);
                if(sx > -80 && sx < VIEW_W+80) {
                    ctx.fillStyle = "#7cb518"; ctx.fillRect(sx, GROUND_Y-18, 64, 18);
                    ctx.fillStyle = "#f3b33d"; ctx.fillRect(sx+12, GROUND_Y-32, 28, 14);
                }
            }
            ctx.fillStyle = "#b97f44"; ctx.fillRect(0, GROUND_Y-5, VIEW_W, 10);
            for(let i=0;i<8;i++) ctx.fillRect(i*120+25, GROUND_Y-14, 28, 8);
            ctx.fillStyle = "#f9e0a0";
            ctx.beginPath(); ctx.arc(75, 68, 34, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#ffdd88"; ctx.beginPath(); ctx.arc(75, 68, 26, 0, Math.PI*2); ctx.fill();
        }
        
        function drawPlayer() {
            let x = worldToScreen(player.worldX), y = player.y;
            let alpha = (player.invincibleTimer>0 && (Math.floor(Date.now()/70)%2===0))?0.6:1;
            ctx.save(); 
            if(alpha<1) ctx.globalAlpha=alpha;
            
            // 根据状态选择动画
            let animType = 'zhanl';
            let frameIndex = 0;
            let frameSpeed = 8;
            
            if(player.attackTimer > 0) {
                animType = 'hit';
                frameSpeed = 4;
            } else if(Math.abs(player.vx) > 0.5) {
                animType = 'walk';
                frameSpeed = 6;
            }
            
            animFrameTimer++;
            if(animFrameTimer >= frameSpeed) {
                animFrame = (animFrame + 1) % 8;
                animFrameTimer = 0;
            }
            frameIndex = animFrame;
            
            let spriteArray = playerSprites[animType];
            if(spriteArray && spriteArray.length > 0 && spriteArray[frameIndex] && spriteArray[frameIndex].complete) {
                let sprite = spriteArray[frameIndex];
                if(!player.facingRight) {
                    ctx.translate(x + player.width/2, y + player.height/2);
                    ctx.scale(-1, 1);
                    ctx.drawImage(sprite, -player.width/2, -player.height/2, player.width, player.height);
                    ctx.translate(-(x + player.width/2), -(y + player.height/2));
                } else {
                    ctx.drawImage(sprite, x, y, player.width, player.height);
                }
            }
            
            ctx.restore();
            ctx.fillStyle = "#333"; ctx.fillRect(x, y-12, player.width, 6);
            ctx.fillStyle = "#ffcf9a"; ctx.fillRect(x, y-12, (player.mp/player.maxMp)*player.width, 6);
        }
        
        function drawEnemy(e) {
            let x = worldToScreen(e.worldX), y = e.y;
            if(x + e.width < 0 || x > VIEW_W) return;
            
            ctx.save();
            
            if(e.hitTimer > 0) {
                ctx.globalAlpha = 0.5 + Math.sin(Date.now() / 50) * 0.3;
            }
            
            // 使用图片绘制怪物
            if(enemyImage && enemyImage.complete) {
                ctx.drawImage(enemyImage, x, y, e.width, e.height);
            }
            
            ctx.restore();
            
            // 血条
            ctx.fillStyle = "#d4442e"; ctx.fillRect(x, y-10, e.width, 6);
            ctx.fillStyle = "#6fe66f"; ctx.fillRect(x, y-10, e.width * (e.hp/e.maxHp), 6);
        }
        
        function drawProjectiles() {
            for(let p of projectiles) {
                let sx = worldToScreen(p.worldX);
                ctx.fillStyle = "#88ddff"; ctx.fillRect(sx, p.y, p.width, p.height);
                ctx.fillStyle = "white"; ctx.fillRect(sx+8, p.y+6, 12, 10);
            }
        }
        function drawParticles() {
            for(let p of particles) {
                let sx = worldToScreen(p.worldX);
                if(p.isText) { ctx.font = "bold 16px monospace"; ctx.fillStyle = p.color; ctx.fillText(p.text, sx, p.y); }
                else if(p.isSlash) {
                    // 绘制烈焰斩特效 - 向下挥砍
                    ctx.save();
                    ctx.translate(sx + p.size/2, p.y + p.size/2);
                    ctx.rotate(p.angle);
                    ctx.shadowColor = p.color;
                    ctx.shadowBlur = 15;
                    
                    // 绘制火焰色的弧形斩击
                    const gradient = ctx.createLinearGradient(-p.size/2, -p.size/2, p.size/2, p.size/2);
                    gradient.addColorStop(0, "#ffffff");
                    gradient.addColorStop(0.3, p.color);
                    gradient.addColorStop(1, "#ff4400");
                    
                    ctx.beginPath();
                    ctx.arc(0, 0, p.size/2, -Math.PI/3, Math.PI/6);
                    ctx.lineWidth = 5;
                    ctx.strokeStyle = gradient;
                    ctx.lineCap = 'round';
                    ctx.stroke();
                    
                    ctx.restore();
                }
                else { 
                    ctx.shadowColor = p.color;
                    ctx.shadowBlur = 8;
                    ctx.fillStyle = p.color; 
                    ctx.beginPath();
                    ctx.arc(sx + p.size/2, p.y + p.size/2, p.size/2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }
        }
        function drawUItext() {
            // 在屏幕内绘制血量条
            let hpBarX = 20, hpBarY = 20, hpBarW = 150, hpBarH = 16;
            ctx.fillStyle = "#333";
            ctx.fillRect(hpBarX, hpBarY, hpBarW, hpBarH);
            let hpPercent = player.hp / player.maxHp;
            let hpGradient = ctx.createLinearGradient(hpBarX, 0, hpBarX + hpBarW, 0);
            hpGradient.addColorStop(0, "#ff4444");
            hpGradient.addColorStop(1, "#ffaa00");
            ctx.fillStyle = hpGradient;
            ctx.fillRect(hpBarX, hpBarY, hpBarW * hpPercent, hpBarH);
            ctx.strokeStyle = "#666";
            ctx.lineWidth = 1;
            ctx.strokeRect(hpBarX, hpBarY, hpBarW, hpBarH);
            ctx.font = "bold 12px monospace";
            ctx.fillStyle = "#fff";
            ctx.fillText(Math.floor(player.hp) + "/" + player.maxHp, hpBarX + 5, hpBarY + 13);

            // 绘制体力条
            let mpBarX = 20, mpBarY = 42, mpBarW = 150, mpBarH = 12;
            ctx.fillStyle = "#333";
            ctx.fillRect(mpBarX, mpBarY, mpBarW, mpBarH);
            let mpPercent = player.mp / player.maxMp;
            let mpGradient = ctx.createLinearGradient(mpBarX, 0, mpBarX + mpBarW, 0);
            mpGradient.addColorStop(0, "#4488ff");
            mpGradient.addColorStop(1, "#88ccff");
            ctx.fillStyle = mpGradient;
            ctx.fillRect(mpBarX, mpBarY, mpBarW * mpPercent, mpBarH);
            ctx.strokeStyle = "#666";
            ctx.lineWidth = 1;
            ctx.strokeRect(mpBarX, mpBarY, mpBarW, mpBarH);
            ctx.font = "bold 11px monospace";
            ctx.fillStyle = "#fff";
            ctx.fillText(Math.floor(player.mp) + "/" + player.maxMp, mpBarX + 5, mpBarY + 10);

            // 绘制技能提示
            ctx.font = "bold 13px monospace";
            ctx.fillStyle = "#2f2a1f";
            ctx.fillText("左键烈焰斩 | Z火球 | X风暴", 20, 70);

            // 蓄力提示
            if(player.attackCooldown>0) {
                ctx.font = "bold 14px monospace";
                ctx.fillStyle = "#ff6633";
                ctx.fillText("蓄力中", worldToScreen(player.worldX)-25, player.y-20);
            }

            // 绘制连击
            if(combo > 0) {
                ctx.font = "bold 16px monospace";
                ctx.fillStyle = "#ffcc00";
                ctx.fillText(combo + "x 连击", VIEW_W - 80, 35);
            }
        }
        
        // 游戏循环
        let frameRequest;
        function gameLoop(nowMs) {
            if(!lastFrameTime) lastFrameTime = nowMs;
            if(!gamePaused) {
                updateSpawningTimer(nowMs);
                if(gameActive) {
                    handleMovement();
                    autoTargetNearestEnemy(); // 自动索敌
                    updateEnemies();
                    handleCollisionDamage();
                    updateTimers();
                    updateProjectiles();
                    updateParticles();
                    updateCamera();
                    if(player.hp <= 0) { gameOver(); }
                }
            }
            drawBackground();
            for(let e of enemies) drawEnemy(e);
            drawPlayer();
            drawProjectiles();
            drawParticles();
            drawUItext();
            if(!gameActive) {
                ctx.font = "38px monospace"; ctx.fillStyle = "#bd4a2c"; ctx.fillText("GAME OVER", VIEW_W/2-130, VIEW_H/2-40);
                ctx.font = "18px monospace"; ctx.fillStyle = "#f7bc45"; ctx.fillText("按 R 键 或 点击重生", VIEW_W/2-125, VIEW_H/2+30);
            }
            if(gamePaused) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
                ctx.fillRect(0, 0, VIEW_W, VIEW_H);
                ctx.font = "48px monospace"; ctx.fillStyle = "#ffffff"; ctx.fillText("暂停", VIEW_W/2-80, VIEW_H/2);
                ctx.font = "20px monospace"; ctx.fillStyle = "#f7bc45"; ctx.fillText("点击继续或按空格键", VIEW_W/2-120, VIEW_H/2+50);
            }
            frameRequest = requestAnimationFrame(gameLoop);
        }
        
        // 开始游戏
        function startGame() {
            gameActive = true;
            gamePaused = false;
            gameTimeSeconds = 0;
            score = 0;
            combo = 0;
            enemies = [];
            projectiles = [];
            particles = [];
            waveIntensity = 1;
            currentSpawnInterval = 2.2;
            spawnAccumulator = 0;
            lastTimestamp = 0;
            player.hp = player.maxHp;
            player.mp = 100;
            player.worldX = 0;
            player.vx = 0;
            player.facingRight = true;
            worldOffsetX = 0;
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('resetBtn').style.display = 'inline-block';
            // 初始化游戏时间和击杀数
            startGameWithTime();
            updateUI();
        }

        // 自动索敌 - 自动朝向最近的敌人
        function autoTargetNearestEnemy() {
            if(!gameActive || enemies.length === 0) return;
            
            let nearestDist = Infinity;
            let nearestEnemy = null;
            
            for(let e of enemies) {
                let dist = Math.abs(e.worldX - player.worldX);
                if(dist < nearestDist) {
                    nearestDist = dist;
                    nearestEnemy = e;
                }
            }
            
            if(nearestEnemy) {
                player.facingRight = nearestEnemy.worldX >= player.worldX;
            }
        }

        // 烈焰斩特效 - 水平斩击
        function addSlashEffect() {
            let startX = player.facingRight ? player.worldX + player.width : player.worldX - 20;
            let y = player.y + player.height / 2;
            let endX = player.facingRight ? player.worldX + player.width + 60 : player.worldX - 80;
            
            // 水平斩击的轨迹粒子，每个位置都生成爆炸粒子
            for(let i = 0; i < 8; i++) {
                let progress = i / 8;
                
                setTimeout(() => {
                    let currentX = startX + (endX - startX) * progress;
                    
                    // 轨迹粒子
                    let slash = {
                        worldX: currentX,
                        y: y,
                        vx: 0,
                        vy: 0,
                        life: 6,
                        color: `hsl(${15 + Math.random() * 25}, 100%, ${50 + Math.random() * 30}%)`,
                        size: 12 + Math.random() * 8,
                        isSlash: true,
                        angle: 0,
                        progress: progress
                    };
                    particles.push(slash);
                    
                    // 在轨迹位置生成爆炸粒子
                    for(let j = 0; j < 3; j++) {
                        let angle = Math.random() * Math.PI * 2;
                        let speed = 1 + Math.random() * 2;
                        particles.push({
                            worldX: currentX,
                            y: y,
                            vx: Math.cos(angle) * speed * (player.facingRight ? 1 : -1),
                            vy: Math.sin(angle) * speed,
                            life: 10,
                            color: `hsl(${10 + Math.random() * 35}, 100%, ${40 + Math.random() * 40}%)`,
                            size: 3 + Math.random() * 4
                        });
                    }
                }, i * 15);
            }
        }
        
        // 火球术特效
        function addFireballEffect() {
            let projX = player.facingRight ? player.worldX + player.width : player.worldX - 38;
            let projY = player.y + 20;
            
            // 发射时的火焰拖尾
            for(let i = 0; i < 5; i++) {
                setTimeout(() => {
                    particles.push({
                        worldX: projX + (player.facingRight ? 1 : -1) * i * 5,
                        y: projY + (Math.random() - 0.5) * 10,
                        vx: (player.facingRight ? 1 : -1) * 3,
                        vy: (Math.random() - 0.5) * 2,
                        life: 6,
                        color: `hsl(${20 + Math.random() * 20}, 100%, ${60 + Math.random() * 30}%)`,
                        size: 4 + Math.random() * 3
                    });
                }, i * 20);
            }
        }
        
        // 烈焰风暴特效
        function addFirestormEffect() {
            // 旋转火焰特效
            for(let i = 0; i < 30; i++) {
                setTimeout(() => {
                    let angle = (i / 30) * Math.PI * 2;
                    let radius = 30 + Math.random() * 40;
                    let fx = player.worldX + player.width / 2 + Math.cos(angle) * radius;
                    let fy = player.y + player.height / 2 + Math.sin(angle) * radius;
                    
                    particles.push({
                        worldX: fx,
                        y: fy,
                        vx: Math.cos(angle + Math.PI / 2) * 2,
                        vy: Math.sin(angle + Math.PI / 2) * 2,
                        life: 10,
                        color: `hsl(${15 + Math.random() * 30}, 100%, ${50 + Math.random() * 35}%)`,
                        size: 6 + Math.random() * 4
                    });
                }, i * 30);
            }
            
            // 中心爆炸
            for(let i = 0; i < 20; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = 3 + Math.random() * 4;
                particles.push({
                    worldX: player.worldX + player.width / 2,
                    y: player.y + player.height / 2,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 1,
                    life: 12,
                    color: `hsl(${10 + Math.random() * 40}, 100%, ${45 + Math.random() * 40}%)`,
                    size: 5 + Math.random() * 5
                });
            }
        }

        // 事件绑定
        canvas.addEventListener('mousedown',(e)=>{ 
            if(e.button===0) {
                if(gamePaused) {
                    togglePause();
                } else if(gameActive) {
                    // 根据鼠标点击位置相对于玩家中心的位置决定攻击方向
                    let rect = canvas.getBoundingClientRect();
                    let clickX = e.clientX - rect.left;
                    let playerScreenX = worldToScreen(player.worldX) + player.width / 2;
                    
                    // 根据点击位置设置玩家朝向
                    player.facingRight = clickX >= playerScreenX;
                    normalAttack(); 
                    addSlashEffect(); // 添加烈焰斩特效
                }
            } 
            e.preventDefault(); 
        });
        window.addEventListener('keydown',(e)=>{
            let k=e.key.toLowerCase();
            pixelKeys = loadPixelControls();
            updateControlsDisplay();
            if(k===pixelKeys.up.toLowerCase()) keys.w=true; if(k===pixelKeys.down.toLowerCase()) keys.s=true; if(k===pixelKeys.left.toLowerCase()) keys.a=true; if(k===pixelKeys.right.toLowerCase()) keys.d=true;
            if(k===' ') { 
                keys.space=true; 
                if(gameActive) {
                    togglePause();
                }
                e.preventDefault(); 
            }
            if(k===pixelKeys.fire.toLowerCase() && gameActive && !gamePaused) skillFireball();
            if(k===pixelKeys.firestorm.toLowerCase() && gameActive && !gamePaused) skillFirestorm();
            if(k===pixelKeys.restart.toLowerCase()) resetGame();
            if([pixelKeys.up.toLowerCase(), pixelKeys.down.toLowerCase(), pixelKeys.left.toLowerCase(), pixelKeys.right.toLowerCase(), pixelKeys.fire.toLowerCase(), pixelKeys.firestorm.toLowerCase(), pixelKeys.restart.toLowerCase(), ' '].includes(k)) e.preventDefault();
        });
        window.addEventListener('keyup',(e)=>{ let k=e.key.toLowerCase(); pixelKeys = loadPixelControls(); if(k===pixelKeys.up.toLowerCase()) keys.w=false; if(k===pixelKeys.down.toLowerCase()) keys.s=false; if(k===pixelKeys.left.toLowerCase()) keys.a=false; if(k===pixelKeys.right.toLowerCase()) keys.d=false; if(k===' ') keys.space=false; });
        document.getElementById('resetBtn').addEventListener('click',()=>resetGame());
        document.getElementById('startBtn').addEventListener('click',()=>startGame());
        document.getElementById('pauseBtn').addEventListener('click',()=>togglePause());
        document.getElementById('backBtn').addEventListener('click',()=>{
            window.location.href = '../inMaxNineUI.html';
        });
        
        // 切换暂停状态
        function togglePause() {
            if(!gameActive) return;
            gamePaused = !gamePaused;
            if(gamePaused) {
                lastFrameTime = 0; // 重置帧时间，避免暂停期间的时间差导致生成大量怪物
            }
            updateUI();
        }
        
        // 累积数据（不立即结算）
        let accumulatedData = {
            currency: 0,
            exp: 0,
            killCount: 0,
            winCount: 0,
            loseCount: 0
        };
        
        // 游戏开始时间
        let gameStartTime = 0;
        
        // 击杀数
        let totalKills = 0;
        
        // 开始游戏时记录时间
        function startGameWithTime() {
            gameStartTime = performance.now() / 1000;
            totalKills = 0;
            accumulatedData = {
                currency: 0,
                exp: 0,
                killCount: 0,
                winCount: 0,
                loseCount: 0
            };
        }
        
        // 增加击杀数
        function addKill() {
            totalKills++;
        }
        
        // 保存战斗记录并累加数据
        function saveBattleRecord(isQuit) {
            // 计算游戏时长
            const gameDuration = Math.floor((performance.now() / 1000) - gameStartTime);
            const minutes = Math.floor(gameDuration / 60);
            const seconds = gameDuration % 60;
            const timeStr = `${minutes}m${seconds}s`;
            
            // 游戏模式名称
            const gameMode = '像素远征';
            
            // 只有玩家主动结束才算胜利，死亡算失败
            const result = isQuit ? 'win' : 'lose';
            
            // 创建战斗记录
            const battleRecord = {
                result: result,
                time: timeStr,
                currency: score,
                exp: Math.floor(score * 0.5),
                mode: gameMode,
                killCount: totalKills,
                survivalTime: gameDuration,
                timestamp: Date.now(),
                isPlayerQuit: isQuit
            };
            
            // 从localStorage获取现有战斗记录
            const battles = JSON.parse(localStorage.getItem('battleData')) || [];
            
            // 添加新记录到开头
            battles.unshift(battleRecord);
            
            // 只保留最近100条记录
            const recentBattles = battles.slice(0, 100);
            
            // 保存到localStorage
            localStorage.setItem('battleData', JSON.stringify(recentBattles));
            
            // 累加数据到累积变量（不立即结算到用户账户）
            accumulatedData.currency += score;
            accumulatedData.exp += Math.floor(score * 0.5);
            accumulatedData.killCount += totalKills;
            if (result === 'win') {
                accumulatedData.winCount++;
            } else {
                accumulatedData.loseCount++;
            }
            
            // 检查成就
            const gameCount = parseInt(localStorage.getItem('userGameCount')) || 0;
            checkAchievements(battleRecord, gameCount + 1);
        }
        
        // 结算累积数据到用户账户
        function settleAccumulatedData() {
            if (accumulatedData.currency === 0 && accumulatedData.exp === 0 &&
                accumulatedData.killCount === 0 && accumulatedData.winCount === 0 && accumulatedData.loseCount === 0) {
                return;
            }
            
            const finalCurrency = Math.floor(accumulatedData.currency);
            const finalExp = Math.floor(accumulatedData.exp);
            
            // 更新用户货币
            const gold = BigInt(localStorage.getItem('gold') || '0');
            localStorage.setItem('gold', (gold + BigInt(finalCurrency)).toString());
            if (finalCurrency > 0) {
                localStorage.setItem('pendingBattleCurrency', finalCurrency.toString());
            }
            
            // 更新用户经验和等级
            let userLevel = parseInt(localStorage.getItem('userLevel')) || 0;
            let userExp = parseInt(localStorage.getItem('userExp')) || 0;
            userExp += finalExp;
            
            // 检查升级
            let levelUpCurrency = 0;
            let levelUpCount = 0;
            while (userExp >= getExpForLevel(userLevel)) {
                userExp -= getExpForLevel(userLevel);
                userLevel++;
                levelUpCurrency += 100 * userLevel;
                levelUpCount++;
            }
            
            // 如果升级获得了货币
            if (levelUpCurrency > 0) {
                const gold = BigInt(localStorage.getItem('gold') || '0');
                localStorage.setItem('gold', (gold + BigInt(levelUpCurrency)).toString());
                localStorage.setItem('pendingLevelUpCurrency', levelUpCurrency.toString());
                localStorage.setItem('pendingLevelUpCount', levelUpCount.toString());
            }
            
            localStorage.setItem('userLevel', userLevel.toString());
            localStorage.setItem('userExp', userExp.toString());
            
            // 更新游戏次数
            const gameCount = parseInt(localStorage.getItem('userGameCount')) || 0;
            localStorage.setItem('userGameCount', (gameCount + accumulatedData.winCount + accumulatedData.loseCount).toString());
            
            // 清空累积数据
            accumulatedData = {
                currency: 0,
                exp: 0,
                killCount: 0,
                winCount: 0,
                loseCount: 0
            };
        }
        
        // 计算升级所需经验
        function getExpForLevel(level) {
            return Math.floor(100 * Math.pow(1.5, level));
        }
        
        // 检查成就条件
        function checkAchievements(battle, gameCount) {
            const unlocked = getUnlockedAchievements();
            const newAchievements = [];
            
            // 通用成就（除核弹外，对像素斗游戏也生效）
            
            // 1. 第'一'次？战斗！ - 首次完成任意游戏并结束
            if (!unlocked.includes('medal_one_xie') && gameCount === 1) {
                newAchievements.push('medal_one_xie');
            }
            
            // 2. 怪诞达人 - 击杀150个敌人以上并完成游戏
            if (!unlocked.includes('medal_one_xie_main') && battle.killCount >= 150) {
                newAchievements.push('medal_one_xie_main');
            }
            
            // 3. 战斗大师 - 完成10场战斗，每次结束时货币至少1500
            if (!unlocked.includes('medal_two_xie') && gameCount >= 10 && battle.currency >= 1500) {
                const battles = JSON.parse(localStorage.getItem('battleData')) || [];
                const last10Battles = battles.slice(0, 10);
                const allMeetCurrency = last10Battles.every(b => b.currency >= 1500);
                if (allMeetCurrency) {
                    newAchievements.push('medal_two_xie');
                }
            }
            
            // 4. 超级怪诞 - 击杀500个敌人以上并完成游戏
            if (!unlocked.includes('medal_two_xie_main') && battle.killCount >= 500) {
                newAchievements.push('medal_two_xie_main');
            }
            
            // 像素斗专属成就
            
            // 像素初征 - 在像素斗中首次完成游戏
            if (!unlocked.includes('medal_pixel_first') && gameCount >= 1) {
                newAchievements.push('medal_pixel_first');
            }
            
            // 像素杀手 - 在像素斗中击杀100个敌人
            if (!unlocked.includes('medal_pixel_killer') && battle.killCount >= 100) {
                newAchievements.push('medal_pixel_killer');
            }
            
            // 像素大师 - 在像素斗中击杀500个敌人
            if (!unlocked.includes('medal_pixel_master') && battle.killCount >= 500) {
                newAchievements.push('medal_pixel_master');
            }
            
            // 像素传奇 - 在像素斗中生存超过5分钟
            if (!unlocked.includes('medal_pixel_legend') && battle.survivalTime >= 300) {
                newAchievements.push('medal_pixel_legend');
            }
            
            // 如果有新成就，保存并更新
            if (newAchievements.length > 0) {
                const allUnlocked = [...unlocked, ...newAchievements];
                saveUnlockedAchievements(allUnlocked);
                
                // 保存待显示的成就队列
                localStorage.setItem('pendingAchievements', JSON.stringify(newAchievements));
            }
        }
        
        // 获取已解锁的成就
        function getUnlockedAchievements() {
            let achievements = JSON.parse(localStorage.getItem('unlockedAchievements')) || [];
            if (achievements.length === 0) {
                achievements = JSON.parse(localStorage.getItem('userAchievements')) || [];
            }
            return achievements;
        }
        
        // 保存已解锁的成就
        function saveUnlockedAchievements(achievements) {
            localStorage.setItem('unlockedAchievements', JSON.stringify(achievements));
        }
        
        // 游戏结束处理
        function handleGameOver(isQuit) {
            saveBattleRecord(isQuit);
            settleAccumulatedData();
        }
        
        // 修改返回主页按钮，添加游戏结束处理
        document.getElementById('backBtn').addEventListener('click', () => {
            if (gameActive) {
                handleGameOver(true);
            }
            window.location.href = '../inMaxNineUI.html';
        });
        
        // 修改游戏结束逻辑
        function gameOver() {
            gameActive = false;
            handleGameOver(false);
            updateUI();
        }
        
        // 初始状态：游戏未开始
        gameActive = false;
        updateUI();
        lastFrameTime = performance.now();
        frameRequest = requestAnimationFrame(gameLoop);
    })();
</script>
</body>
