<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加载中...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .splash-container {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
        }

        .splash-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            cursor: pointer;
        }

        .skip-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-family: 'Microsoft YaHei', sans-serif;
            font-size: 14px;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            pointer-events: none;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .loading-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #D2B48C;
            font-family: 'Microsoft YaHei', sans-serif;
            font-size: 24px;
            text-align: center;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(210, 180, 140, 0.3);
            border-top-color: #D2B48C;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="splash-container" id="splashContainer">
        <div class="loading-text" id="loadingText">
            <div class="loading-spinner"></div>
            <div id="loadingMessage">正在加载...</div>
        </div>
        <video class="splash-video" id="splashVideo" style="display: none;" autoplay></video>
        <div class="skip-hint" id="skipHint" style="display: none;">点击任意处跳转 · 视频结束自动跳转</div>
    </div>

    <script>
        const HOME_PAGE = 'inMaxNineUI.html';

        function goToHome() {
            window.location.href = HOME_PAGE;
        }

        function showError(message) {
            const loadingText = document.getElementById('loadingText');
            loadingText.innerHTML = `
                <p style="color: #ff6b6b; margin-bottom: 10px;">${message}</p>
                <p style="color: rgba(255,255,255,0.7); font-size: 14px;">即将自动跳转到主页...</p>
            `;
            setTimeout(goToHome, 2000);
        }

        async function initSplash() {
            const settings = JSON.parse(localStorage.getItem('userSettings')) || {};
            const splashVideoEnabled = settings.splashVideoEnabled !== false;

            if (!window.electronAPI) {
                goToHome();
                return;
            }

            if (!splashVideoEnabled) {
                goToHome();
                return;
            }

            const videoExists = await window.electronAPI.splashVideoExists();
            if (!videoExists) {
                goToHome();
                return;
            }

            const videoPathResult = await window.electronAPI.getSplashVideoPath();
            if (!videoPathResult.exists) {
                goToHome();
                return;
            }

            const video = document.getElementById('splashVideo');
            const loadingText = document.getElementById('loadingText');
            const skipHint = document.getElementById('skipHint');

            video.src = 'file://' + videoPathResult.path;
            video.style.display = 'block';
            loadingText.style.display = 'none';

            video.oncanplay = function() {
                document.getElementById('loadingMessage').textContent = '准备播放...';
                setTimeout(function() {
                    loadingText.style.display = 'none';
                    skipHint.style.display = 'block';
                    video.play().catch(function(e) {
                        goToHome();
                    });
                }, 500);
            };

            video.onerror = function() {
                goToHome();
            };

            video.onended = function() {
                goToHome();
            };

            let skipTimeout;
            function resetSkipTimer() {
                clearTimeout(skipTimeout);
                skipTimeout = setTimeout(goToHome, 60000);
            }

            resetSkipTimer();

            video.addEventListener('play', resetSkipTimer);
            video.addEventListener('click', function() {
                clearTimeout(skipTimeout);
                goToHome();
            });

            document.getElementById('splashContainer').addEventListener('click', function(e) {
                if (e.target === video) return;
                clearTimeout(skipTimeout);
                goToHome();
            });
        }

        document.addEventListener('DOMContentLoaded', initSplash);
    </script>
</body>
</html>
