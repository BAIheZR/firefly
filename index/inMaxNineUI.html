	// 从localStorage获取战斗数据并显示最近3场
	function loadRecentBattles() {
		// 从localStorage获取战斗数据，如果没有则使用空数组
		const battles = JSON.parse(localStorage.getItem('battleData')) || [];

		const container = document.getElementById('battleCardsContainer');
		container.innerHTML = '';

		// 检查是否有战斗数据
		if (battles.length === 0) {
			// 显示无游玩记录提示
			container.innerHTML = `
				<div style="text-align: center; padding: 40px 20px; background: rgba(255, 255, 255, 0.8); border-radius: 15px; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);">
					<h2 style="color: #333; font-size: 20px; margin-bottom: 10px;">当前还没有游玩记录</h2>
					<p style="color: #666; font-size: 14px;">开始游戏，创建您的第一条战斗记录吧！</p>
				</div>
			`;
			return;
		}

		// 最多显示3场战斗
		const recentBattles = battles.slice(0, 3);

		recentBattles.forEach(battle => {
			const battleCard = document.createElement('div');
			battleCard.innerHTML = `
				<win-lo-card 
					result="${battle.result}" 
					time="${battle.time}" 
					currency="${battle.currency}" 
					mode="${battle.mode}"
				></win-lo-card>
			`;
			container.appendChild(battleCard);
		});
	}

		// 初始化用户信息同步
		initUserInfoSync();

		// 初始化在线时间跟踪
		initOnlineTimeTracking();

		// 检查"初来乍到"成就
		checkFirstVisitAchievement();

		// 初始化用户头像（默认头像或已保存的头像）
		initUserAvatar();
		
		// 加载最近3个成就
		loadLatestAchievements();
		
		// 检查升级获得的货币并显示模态框
		checkLevelUpCurrency();

		// 为等级添加点击事件
		const levelItem = document.querySelector('.userInfoItem:nth-child(1)');
		if (levelItem) {
			levelItem.style.cursor = 'pointer';
			levelItem.addEventListener('click', showLevelModal);
		}

		// 为时长添加点击事件
		const timeItem = document.querySelector('.userInfoItem:nth-child(2)');
		if (timeItem) {
			timeItem.style.cursor = 'pointer';
			timeItem.addEventListener('click', showTimeModal);
		}

		// 为game-card添加点击事件监听器
		const gameCard = document.querySelector('game-card');
		if (gameCard) {
			gameCard.addEventListener('game-start', function() {
				window.location.href = 'game/game_one.html';
			});
		}
	};

	// 初始化用户头像
	function initUserAvatar() {
		const avatarImg = document.getElementById('avatarImg');
		const avatarPlaceholder = document.getElementById('avatarPlaceholder');
		
		// 获取保存的头像路径，如果没有则使用默认头像
		const savedAvatar = localStorage.getItem('userAvatar');
		
		if (savedAvatar) {
			avatarImg.src = savedAvatar;
			avatarImg.style.display = 'block';
			avatarPlaceholder.style.display = 'none';
		} else {
			// 使用默认头像
			avatarImg.src = '../img/key/default.jpg';
			avatarImg.style.display = 'block';
			avatarPlaceholder.style.display = 'none';
		}
		
		// 头像加载失败时使用默认头像
		avatarImg.onerror = function() {
			this.src = '../img/key/default.jpg';
		};
	}

	// 检查"初来乍到"成就 - 第一次打开游戏时解锁
	function checkFirstVisitAchievement() {
		const visited = localStorage.getItem('firstVisit');
		const unlocked = getUnlockedAchievements();
		
		if (!visited && !unlocked.includes('first_try')) {
			// 标记已访问
			localStorage.setItem('firstVisit', 'true');
			
			// 解锁成就
			const newUnlocked = [...unlocked, 'first_try'];
			localStorage.setItem('unlockedAchievements', JSON.stringify(newUnlocked));
			
			// 保存待显示的成就队列
			localStorage.setItem('pendingAchievements', JSON.stringify(['first_try']));
		}
	}

	// 获取已解锁的成就
	function getUnlockedAchievements() {
		let achievements = JSON.parse(localStorage.getItem('unlockedAchievements')) || [];
		if (achievements.length === 0) {
			achievements = JSON.parse(localStorage.getItem('userAchievements')) || [];
		}
		return achievements;
	}

	// 加载最近3个成就并显示
let achievementsLoaded = false;
function loadLatestAchievements() {
	// 防止重复加载
	if (achievementsLoaded) return;
	
	const container = document.getElementById('latestAchievements');
	if (!container) return;
	
	const unlocked = getUnlockedAchievements();
	
	if (unlocked.length === 0) {
		container.innerHTML = `
			<div style="text-align: center; padding: 20px; background: rgba(255,255,255,0.8); border-radius: 10px; color: #666;">
				<p>暂无成就</p>
			</div>
		`;
		achievementsLoaded = true;
		return;
	}
	
	const latestOne = unlocked.slice(-1).reverse();
	container.innerHTML = '';
	
	latestOne.forEach(achievementId => {
		const wallElement = document.createElement('xz-wall');
		wallElement.setAttribute('achievement-id', achievementId);
		container.appendChild(wallElement);
	});
	
	achievementsLoaded = true;
}

	// 在线时间跟踪

		if (!localStorage.getItem('onlineStartTime')) {
			localStorage.setItem('onlineStartTime', Date.now().toString());
		}
		// 每秒更新在线时长显示
		setInterval(updateOnlineTimeDisplay, 1000);
	}

	// 更新在线时长显示
	function updateOnlineTimeDisplay() {
		const onlineStartTime = parseInt(localStorage.getItem('onlineStartTime')) || Date.now();
		const totalOnlineSeconds = Math.floor((Date.now() - onlineStartTime) / 1000);

		// 只显示在线时长
		document.getElementById('userPlayTime').textContent = formatDuration(totalOnlineSeconds);
	}

	// 用户信息同步
	function initUserInfoSync() {
		syncUserInfoFromBattles();
		setInterval(syncUserInfoFromBattles, 5000);
	}

	// 解析战斗时间字符串 (格式: 5m30s) 为总秒数
	function parseBattleTime(timeStr) {
		if (!timeStr) return 0;
		const match = timeStr.match(/(\d+)m(\d+)s/);
		if (match) {
			return parseInt(match[1]) * 60 + parseInt(match[2]);
		}
		return 0;
	}

	// 格式化时长为 时:分 (不显示秒)
	function formatDuration(totalSeconds) {
		const hours = Math.floor(totalSeconds / 3600);
		const minutes = Math.floor((totalSeconds % 3600) / 60);
		return `${hours}:${String(minutes).padStart(2, '0')}`;
	}

	// 格式化秒数为时:分:秒
	function formatTime(totalSeconds) {
		const hours = Math.floor(totalSeconds / 3600);
		const minutes = Math.floor((totalSeconds % 3600) / 60);
		const seconds = totalSeconds % 60;
		if (hours > 0) {
			return `${hours}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
		}
		return `${minutes}:${String(seconds).padStart(2, '0')}`;
	}

	// 从战斗数据同步用户信息
	function syncUserInfoFromBattles() {
		const battles = JSON.parse(localStorage.getItem('battleData')) || [];

		// 更新游戏次数
		localStorage.setItem('userGameCount', battles.length);

		// 计算总游戏时长（秒）
		let totalGameSeconds = 0;
		battles.forEach(battle => {
			totalGameSeconds += parseBattleTime(battle.time);
		});
		localStorage.setItem('userPlayTime', totalGameSeconds.toString());

		// 统计偏好模式（从游戏保存的数据读取）
		const preferredMode = localStorage.getItem('userPreferredMode');
		
		// 设置最近游玩（从游戏保存的数据读取）
		const recentMode = localStorage.getItem('userRecentMode');

		// 更新页面显示
		document.getElementById('userLevel').textContent = localStorage.getItem('userLevel') || 0;
		const onlineStartTime = parseInt(localStorage.getItem('onlineStartTime')) || Date.now();
		const totalOnlineSeconds = Math.floor((Date.now() - onlineStartTime) / 1000);
		document.getElementById('userPlayTime').textContent = formatDuration(totalOnlineSeconds);
		document.getElementById('userGameCount').textContent = battles.length;
		document.getElementById('userPreferredModes').textContent = preferredMode || '-';
		document.getElementById('userRecentMode').textContent = recentMode || '-';
	}

		const expForNextLevel = calculateExpForLevel(level + 1);
		const progress = expForNextLevel > 0 ? Math.min((currentExp / expForNextLevel) * 100, 100) : 0;

		const modal = document.createElement('div');
		modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;justify-content:center;align-items:center;z-index:10000;';
		modal.innerHTML = `
			<div style="background:#fff;border-radius:15px;padding:30px;max-width:400px;width:90%;text-align:center;position:relative;">
				<img src="../img/key/Mtk.webp" style="position:absolute;top:-15px;left:-15px;width:50px;height:50px;border-radius:50%;">
				<img src="../img/key/dt.gif" style="position:absolute;top:-15px;right:-15px;width:50px;height:50px;border-radius:50%;">
				<h2 style="color:#333;margin-bottom:20px;">等级信息</h2>
				<div style="font-size:48px;color:#D2B48C;margin-bottom:10px;">Lv.${level}</div>
				<div style="color:#666;margin-bottom:20px;">当前经验: ${currentExp} / ${expForNextLevel}</div>
				<div style="background:#eee;border-radius:10px;height:20px;overflow:hidden;margin-bottom:20px;">
					<div style="background:linear-gradient(90deg,#D2B48C,#E6C200);height:100%;width:${progress}%;transition:width 0.3s;"></div>
				</div>
				<div style="color:#888;font-size:14px;margin-bottom:20px;">
					升级还需: ${expForNextLevel - currentExp} 经验
				</div>
				<div style="background:#f5f5f5;border-radius:10px;padding:15px;text-align:left;margin-bottom:20px;">
					<div style="color:#333;font-weight:bold;margin-bottom:10px;">升级方式：</div>
					<div style="color:#666;font-size:13px;">• 击杀敌人 +${getExpByAction('kill')} 经验</div>
					<div style="color:#666;font-size:13px;">• 通关游戏 +${getExpByAction('win')} 经验</div>
					<div style="color:#666;font-size:13px;">• 获得成就 +${getExpByAction('achievement')} 经验</div>
				</div>
				<button onclick="this.parentElement.parentElement.remove()" style="background:#D2B48C;color:#fff;border:none;padding:10px 30px;border-radius:5px;cursor:pointer;">关闭</button>
			</div>
		`;
		modal.addEventListener('click', function(e) {
			if (e.target === modal) modal.remove();
		});
		document.body.appendChild(modal);
	}

	// 计算指定等级所需经验值 (升级所需总经验)
	function calculateExpForLevel(level) {
		if (level <= 1) return 100;
		return Math.floor(100 * Math.pow(1.5, level - 1));
	}

	// 获取各动作经验奖励
	function getExpByAction(action) {
		const expTable = {
			kill: 10,
			win: 50,
			achievement: 30
		};
		return expTable[action] || 10;
	}

	// 随机加载底部图片
	function loadRandomBottomImage() {
		const images = ['bottom_img_one.png', 'bottom_img_two.png', 'bottom_img.png'];
		const randomIndex = Math.floor(Math.random() * images.length);
		const imgElement = document.getElementById('bottomRandomImg');
		if (imgElement) {
			imgElement.src = '../img/key/' + images[randomIndex];
		}
	}
	
	// 检查升级获得的货币并显示模态框
	function checkLevelUpCurrency() {
		const pendingCurrency = localStorage.getItem('pendingLevelUpCurrency');
		const pendingLevelUpCount = localStorage.getItem('pendingLevelUpCount');
		
		if (pendingCurrency && parseInt(pendingCurrency) > 0) {
			const currency = parseInt(pendingCurrency);
			const levelUpCount = parseInt(pendingLevelUpCount) || 1;
			
			// 创建模态框
			const modal = document.createElement('div');
			modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;justify-content:center;align-items:center;z-index:10000;';
			modal.innerHTML = `
				<div style="background:#fff;border-radius:15px;padding:30px;max-width:400px;width:90%;text-align:center;position:relative;">
					<img src="../img/key/Mtk.webp" style="position:absolute;top:-15px;left:-15px;width:50px;height:50px;border-radius:50%;">
					<img src="../img/key/dt.gif" style="position:absolute;top:-15px;right:-15px;width:50px;height:50px;border-radius:50%;">
					<div style="font-size:48px;margin-bottom:20px;">🎉</div>
					<h2 style="color:#333;margin-bottom:10px;">升级奖励</h2>
					<p style="color:#666;margin-bottom:20px;">恭喜你提升了 ${levelUpCount} 级！</p>
					<div style="background:linear-gradient(135deg, #FFD700, #FFA500);border-radius:15px;padding:20px;margin-bottom:20px;">
						<div style="color:#fff;font-size:14px;margin-bottom:5px;">获得货币奖励</div>
						<div style="color:#fff;font-size:36px;font-weight:bold;">+${currency}</div>
					</div>
					<button onclick="this.parentElement.parentElement.remove(); checkBattleCurrency();" style="background:#D2B48C;color:#fff;border:none;padding:10px 30px;border-radius:5px;cursor:pointer;">确定</button>
				</div>
			`;
			modal.addEventListener('click', function(e) {
				if (e.target === modal) {
					modal.remove();
					checkBattleCurrency();
				}
			});
			document.body.appendChild(modal);
			
			// 清除pending数据
			localStorage.removeItem('pendingLevelUpCurrency');
			localStorage.removeItem('pendingLevelUpCount');
		} else {
			// 如果没有升级奖励，检查战斗奖励
			checkBattleCurrency();
		}
	}
	
	// 检查战斗获得的货币并显示模态框
	function checkBattleCurrency() {
		const pendingCurrency = localStorage.getItem('pendingBattleCurrency');
		
		if (pendingCurrency && parseInt(pendingCurrency) > 0) {
			const currency = parseInt(pendingCurrency);
			
			// 创建模态框
			const modal = document.createElement('div');
			modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;justify-content:center;align-items:center;z-index:10000;';
			modal.innerHTML = `
				<div style="background:#fff;border-radius:15px;padding:30px;max-width:400px;width:90%;text-align:center;position:relative;">
					<img src="../img/key/Mtk.webp" style="position:absolute;top:-15px;left:-15px;width:50px;height:50px;border-radius:50%;">
					<img src="../img/key/dt.gif" style="position:absolute;top:-15px;right:-15px;width:50px;height:50px;border-radius:50%;">
					<div style="font-size:48px;margin-bottom:20px;">💰</div>
					<h2 style="color:#333;margin-bottom:10px;">战斗奖励</h2>
					<p style="color:#666;margin-bottom:20px;">本局游戏获得货币</p>
					<div style="background:linear-gradient(135deg, #4CAF50, #8BC34A);border-radius:15px;padding:20px;margin-bottom:20px;">
						<div style="color:#fff;font-size:14px;margin-bottom:5px;">获得货币</div>
						<div style="color:#fff;font-size:36px;font-weight:bold;">+${currency}</div>
					</div>
					<button onclick="this.parentElement.parentElement.remove()" style="background:#D2B48C;color:#fff;border:none;padding:10px 30px;border-radius:5px;cursor:pointer;">确定</button>
				</div>
			`;
			modal.addEventListener('click', function(e) {
				if (e.target === modal) modal.remove();
			});
			document.body.appendChild(modal);
			
			// 清除pending数据
			localStorage.removeItem('pendingBattleCurrency');
		}
	}

	// 应用背景图片
	function applyPageBackground(pageName) {
		const pageBackgrounds = JSON.parse(localStorage.getItem('pageBackgrounds')) || {};
		if (pageBackgrounds[pageName]) {
			document.body.style.background = `url(${pageBackgrounds[pageName]}) center/cover no-repeat fixed`;
		} else {
			document.body.style.background = 'linear-gradient(180deg, #4AB8A0 0%, #000000 100%)';
		}
	}

	// 跳转到设置页面
	function goToSettings() {
		window.location.href = 'setting.html';
	}

	// 显示感谢公告
	function showWelcomeNotice() {
		const modal = document.createElement('div');
		modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;justify-content:center;align-items:center;z-index:10000;';
		modal.innerHTML = `
			<div style="background:rgba(255,255,255,0.95);border-radius:20px;padding:40px;max-width:500px;width:90%;text-align:center;position:relative;box-shadow:0 10px 40px rgba(0,0,0,0.3);">
				<h2 style="color:#333;font-size:24px;margin-bottom:20px;border-bottom:2px solid #D2B48C;padding-bottom:15px;display:flex;align-items:center;"><img src="../img/key/wow.webp" style="width:120px;height:120px;margin-right:10px;">公告</h2>
				<div style="color:#666;font-size:16px;line-height:1.8;text-align:left;">
					<p>感谢使用并且下载安装我们的游戏！</p>
					<p style="margin-top:10px;">更新日志：0.0.2 版本发布</p>
					<p style="margin-top:10px;">移动了感谢墙，添加了新的支持者，和字母索引。</p>
					<p style="margin-top:10px;">添加了第二个游戏模式，不过功能依旧不完善</p>
					<p style="margin-top:10px;">移除了商店和库页面中载具和弹药过多的问题，只留下了必要的载具和弹药。</p>
					<p style="margin-top:10px;">添加了一个新成就</p>
					<p style="margin-top:10px;">聊天页面正在准备中。。。</p>
					<p style="margin-top:10px;">修复了部分bug</p>
					<p style="margin-top:15px;font-weight:bold;color:#D2B48C;">祝您游戏愉快！</p>
				</div>
				<button onclick="this.parentElement.parentElement.remove()" 
					style="margin-top:25px;padding:12px 40px;background:#D2B48C;color:#fff;border:none;border-radius:30px;font-size:16px;cursor:pointer;transition:all 0.3s;">
					知道了
				</button>
			</div>
		`;
		modal.addEventListener('click', function(e) {
			if (e.target === modal) modal.remove();
		});
		document.body.appendChild(modal);
	}

	// 页面加载时应用背景
	window.addEventListener('DOMContentLoaded', function() {
		applyPageBackground('main');
		
		// 检查是否是第一次访问
		const hasSeenNotice = localStorage.getItem('hasSeenWelcomeNotice');
		if (!hasSeenNotice) {
			// 延迟显示，让页面完全加载
			setTimeout(showWelcomeNotice, 1000);
			localStorage.setItem('hasSeenWelcomeNotice', 'true');
		}
	});
</script>
