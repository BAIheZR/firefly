<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
/* 黑色主条：100%宽 + 30px高 */
.custom-border-bar {
  width: 100%;
  height: 30px;
  background-color: #000;
  position: relative;
  overflow: hidden;
}

/* 交叉青绿色块 */
.custom-border-bar::before,
.custom-border-bar::after {
  content: '';
  position: absolute;
  left: 30%;
  width: 10%;
  height: 100%;
  background: linear-gradient(135deg, #4ecdc4, #a8e6cf);
}

/* 斜角 1 */
.custom-border-bar::before {
  transform: skewX(-45deg);
}

/* 斜角 2 + 金色 10px 厚度边框 */
.custom-border-bar::after {
  transform: skewX(45deg);
  opacity: 0.8;
  /* 金色厚度 10px（核心参数） */
  box-shadow: 0 0 0 10px #D2B48C;
  z-index: 2;
}
</style>
</head>
<body>
  <div class="custom-border-bar"></div>
</body>
</html>
